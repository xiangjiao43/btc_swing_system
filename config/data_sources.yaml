# ============================================================
# data_sources.yaml — 数据源与中转站配置
# ============================================================
# 用途:声明本项目所有数据源及其访问参数(URL / 认证 / 超时 / 重试 /
#       速率限制)。真实 URL 和 API key **永远不写在这里**,
#       只写对应的环境变量名,运行时代码从 .env 读取真值。
#
# 与建模文档的对应:§3.1(数据平台清单)、§3.1.2(中转站配置)、
#                   §10.2(中转站 .env 模板)。
#
# 编码期惯例(§3.1.2):
#   1) 所有数据采集器的 base_url 从本文件读取,指向环境变量名。
#   2) 中转站 URL 与 API key 放 .env,不进代码库。
#   3) 中转站切换或失效时,只改 .env,不改代码也不改本文件。
#   4) 每个数据源独立配置 timeout / 重试 / 速率限制。
#
# 创建于:2026-04-22(Sprint 1 前置工作 · 优化二第 1 批)
# 建模版本:v1.2
# ============================================================


# -------- 全局默认值 -------------------------------------------------
# 各 source 未显式指定字段时,回退到这里。减少重复。
# 单位: *_sec = 秒; requests_per_minute = 每分钟请求数
defaults:
  timeout_sec: 10
  retry:
    max_attempts: 3          # 首次请求失败后最多重试的次数(不含首次)
    backoff_sec: 2           # 首次重试前的等待秒数(exponential 模式时作为基数)
    backoff_strategy: "exponential"   # exponential | linear | fixed
    # HTTP 状态码在下列集合中时才重试;其他错误(如 4xx auth)直接抛出
    retry_on_status: [408, 429, 500, 502, 503, 504]
  rate_limit:
    # 客户端侧限流,避免打满中转站的上游额度。具体上限请对照官方文档调整。
    requests_per_minute: 60
    # 请求排队策略:queue = 阻塞等待,reject = 直接抛错
    on_exceed: "queue"


# -------- 数据源声明 -------------------------------------------------
# 每个条目使用统一 schema,字段语义:
#   enabled:         是否启用该数据源(关闭仅用于调试)
#   name:            人类可读名称(用于日志 / 告警)
#   purpose:         该源在本系统中的用途(对应证据层的数据需求)
#   base_url_env:    base_url 存放的环境变量名;.env 里可选覆盖。
#                    未设置或为空时,代码回退到 base_url_default。
#   base_url_default: 兜底 URL(直连官方 / 默认中转站)。
#   auth_type:       api_key / none
#   auth_method:     header / query / null(仅 auth_type=api_key 时非空)
#   api_key_env:     API key 存放的环境变量名;auth_type = none 时置 null
#   api_key_header_name:  auth_method=header 时,注入 API key 的 Header 名
#   api_key_query_name:   auth_method=query 时,注入 API key 的查询参数名
#                         (header_name / query_name 互斥;按 auth_method 选一)
#   timeout_sec:     单次请求超时
#   retry:           见 defaults.retry
#   rate_limit:      见 defaults.rate_limit
#   freshness_class: 新鲜度分档(price / derivatives / macro / onchain /
#                    event),对应 §3.2.3 阈值表;stale 判定由 freshness.py
#                    查 data_catalog.yaml 做。
#   notes:           人类备注(不参与逻辑)

sources:

  # =======================================================================
  # 架构说明(Sprint 1.2 v2,2026-04-23)
  # =======================================================================
  # Binance 已从数据源中**移除**:
  #   - api.binance.com / fapi.binance.com:美国 IP 返回 HTTP 451(地域封禁)
  #   - data.binance.vision:是静态 ZIP/CSV 仓库,不是 REST API
  # 旧系统验证过的真实架构:
  #   - BTC K 线:CoinGlass(主数据源)/v4/api/futures/price/history
  #   - 所有衍生品:CoinGlass(funding / OI / long_short / liquidation / net_position)
  #   - 链上:Glassnode
  #   - CoinGlass 和 Glassnode 共享中转站 https://api.alphanode.work
  #   - 共享鉴权:HTTP header "x-key"(小写),COINGLASS_API_KEY 和
  #     GLASSNODE_API_KEY 通常填同一个 alphanode 中转站 key
  # 见 docs/PROJECT_LOG.md 2026-04-23 条目。
  # =======================================================================

  # ---- 1. CoinGlass(BTC K 线 + 所有衍生品,走 api.alphanode.work)------
  # §3.6.1(K 线)+ §3.6.2(衍生品)
  # 合并为单一数据源:原架构下 Binance 承担 K 线 + 部分衍生品、CoinGlass
  # 补充衍生品;美国 IP 下 Binance 全线不可用,由 CoinGlass 全面承担。
  coinglass:
    enabled: true
    name: "CoinGlass (via api.alphanode.work)"
    purpose: "BTC klines (primary source) + all derivatives (funding, OI, long_short, liquidation, net_position)"
    base_url_env: "COINGLASS_BASE_URL"
    base_url_default: "https://api.alphanode.work"     # 旧系统验证过的统一中转站
    auth_type: "api_key"
    auth_method: "header"
    api_key_env: "COINGLASS_API_KEY"
    api_key_header_name: "x-key"                        # 旧系统验证过(小写连字符)
    api_key_query_name: null
    timeout_sec: 20                                     # 旧系统值
    retry:
      max_attempts: 3                                   # 首次 + 2 次重试
      backoff_sec: 8                                    # 旧系统值
      backoff_strategy: "fixed"                         # 固定间隔 8s
      retry_on_status: [408, 429, 500, 502, 503, 504]
    rate_limit:
      requests_per_minute: 15                           # 旧系统 RateLimiter 参数
      on_exceed: "queue"
    freshness_class: "derivatives"                      # 价格与衍生品混合;细分见 data_catalog.yaml
    notes: >
      旧系统验证过的合并数据源:域名 api.alphanode.work,header "x-key"。
      COINGLASS_API_KEY 和 GLASSNODE_API_KEY 一般可填同一个 alphanode 中转 key。
      K 线端点:/v4/api/futures/price/history(symbol=BTCUSDT, exchange=Binance)。

  # ---- 2. Glassnode(链上,和 CoinGlass 共享中转站 api.alphanode.work)---
  # §3.6.3:Advanced 档三档分层(MVRV / NUPL / SOPR / Reserve Risk 等)。
  glassnode:
    enabled: true
    name: "Glassnode Advanced (via api.alphanode.work)"
    purpose: "On-chain metrics (MVRV, NUPL, SOPR, Reserve Risk, LTH/STH, ...)"
    base_url_env: "GLASSNODE_BASE_URL"
    base_url_default: "https://api.alphanode.work"     # 与 CoinGlass 同域名
    auth_type: "api_key"
    auth_method: "header"                               # v2 修正:同 CoinGlass,不用 query
    api_key_env: "GLASSNODE_API_KEY"
    api_key_header_name: "x-key"                        # 旧系统统一 header
    api_key_query_name: null
    timeout_sec: 15
    retry:
      max_attempts: 3
      backoff_sec: 3
      backoff_strategy: "exponential"
      retry_on_status: [408, 429, 500, 502, 503, 504]
    rate_limit:
      requests_per_minute: 120
      on_exceed: "queue"
    freshness_class: "onchain"   # > 48 h 视为 stale(§3.2.3)
    notes: >
      旧系统验证过:与 CoinGlass 共享中转站 api.alphanode.work + header x-key。
      链上数据多为日级;采集计划 08:15-08:30(北京)事件触发,
      见 base.yaml → runtime.event_driven.types.event_onchain。

  # ---- 4. Yahoo Finance(宏观,直连)------------------------------
  # §3.6.4:DXY / US10Y / VIX / 美股指数。yfinance 库直连,无 API key。
  yahoo_finance:
    enabled: true
    name: "Yahoo Finance (direct)"
    purpose: "Macro series: DXY, US10Y, VIX, SPX, NDX"
    # 直连而非中转;留 env 名方便将来改成中转(值留空即代表直连默认)
    base_url_env: "YAHOO_FINANCE_BASE_URL"   # 可选,未设置时 yfinance 走默认
    auth_type: "none"
    auth_method: null
    api_key_env: null
    api_key_header_name: null
    api_key_query_name: null
    timeout_sec: 15
    retry:
      max_attempts: 3
      backoff_sec: 2
      backoff_strategy: "exponential"
      retry_on_status: [408, 429, 500, 502, 503, 504]
    rate_limit:
      # yfinance 无官方上限,但太快易被限流;保守 30/min
      requests_per_minute: 30
      on_exceed: "queue"
    freshness_class: "macro"   # > 36 h 视为 stale
    notes: >
      v1 使用 yfinance 库调用;v1.0 上云后可切 Yahoo 官方 REST 或 FRED 主源。

  # ---- 5. FRED(宏观,直连,备用)-----------------------------------
  # §3.6.4:Yahoo 缺失或停更时的备用宏观源(美联储公开数据)。
  fred:
    enabled: true
    name: "FRED (direct)"
    purpose: "Backup macro: DGS10, DGS2, DEXBZUS, VIX ..."
    base_url_env: "FRED_BASE_URL"   # 默认 https://api.stlouisfed.org/fred/
    auth_type: "api_key"            # FRED 免费但需要注册拿 key
    auth_method: "query"
    api_key_env: "FRED_API_KEY"
    api_key_header_name: null
    api_key_query_name: "api_key"
    timeout_sec: 10
    retry:
      max_attempts: 3
      backoff_sec: 2
      backoff_strategy: "exponential"
      retry_on_status: [408, 429, 500, 502, 503, 504]
    rate_limit:
      # FRED 官方 120/min 的软上限
      requests_per_minute: 60
      on_exceed: "queue"
    freshness_class: "macro"
    notes: >
      只在 Yahoo 失败或数据缺失时启用(由 collector 兜底逻辑触发),
      平时可关 enabled 节省。

  # ---- 6. 事件日历源(v1 手动维护为主)-----------------------------
  # §3.6.5:FOMC / CPI / NFP / 期权到期 / ETF 审批窗口等事件时间表。
  # v1.2 纪律:手动维护 event_calendar.yaml 为主,本源仅用于校对。
  event_calendar_source:
    enabled: false               # v1 默认关闭,仅用 event_calendar.yaml
    name: "Investpy / Trading Economics (direct, optional)"
    purpose: "Backup / verification for event_calendar.yaml"
    base_url_env: "EVENT_CAL_BASE_URL"
    auth_type: "api_key"
    auth_method: "query"
    api_key_env: "EVENT_CAL_API_KEY"
    api_key_header_name: null
    api_key_query_name: "api_key"
    timeout_sec: 15
    retry:
      max_attempts: 2
      backoff_sec: 2
      backoff_strategy: "linear"
      retry_on_status: [408, 429, 500, 502, 503, 504]
    rate_limit:
      requests_per_minute: 30
      on_exceed: "reject"
    freshness_class: "event"
    notes: >
      v1 纪律(§3.6.5):手动维护 event_calendar.yaml 为唯一事件源;
      本条目留作将来上云后的校对来源,默认关闭。
