    depends_on: [exchange_net_flow_7d_mean]
    formula_ref: src/indicators/onchain.py::exchange_momentum_score
    frequency: hourly
    layer: L2
    role_in_v1: primary
    notes: >
      v1.2 降级为 L2 内部修正项;做空侧不参与 stance_confidence 计算(B5)。
      评分细节见 thresholds.yaml / 建模 §3.9。


# ============================================================
# PART 3 — composite_factors(L3 组合因子,v1.2 最终 6 个)
# ============================================================
# v1.2 纪律(§2.2 第 7 条):每个组合因子**只在 single_use_point 指定的
# 唯一位置消费**;跨层再次评分属于反模式。
# 删除项:EntryWindowQuality(v1.2 M 条目删除)
# 降级项:ExchangeMomentum(降为 L2 内部修正项,见 single_factors 上方)

composite_factors:

  - name: truth_trend
    depends_on:
      - adx_14_1d
      - adx_14_4h
      - multi_tf_direction_consistency
      - ma_20_1d
      - ma_60_1d
      - ma_120_1d
      - ma_200_1d
    formula_ref: src/composite/truth_trend.py::compute
    layer: L1
    single_use_point: l1_regime_and_confidence
    output_range: [0, 9]
    notes: "§3.8.1;输出不跨层传递,L3 不读原始分数(B1)"

  - name: band_position
    depends_on:
      - binance_klines_1d
      - swing_highs_lows_1d
      - ma_60_1d
    formula_ref: src/composite/band_position.py::compute
    layer: L2
    single_use_point: l2_phase
    output_range: null                   # 输出 phase + confidence,不是单一数值
    notes: "§3.8.2;v1.2 只用价格几何,已移除 MVRV Z 和 STH-SOPR"

  - name: cycle_position
    depends_on:
      - mvrv_z_score
      - nupl
      - lth_supply_90d_change
      - ath_drawdown
    formula_ref: src/composite/cycle_position.py::compute
    layer: L2
    single_use_point: l2_long_cycle_context
    output_range: null                   # 九档枚举 + confidence
    notes: >
      §3.8.4;v1.2 九档完整化(M1/M2)。辅助条件是否决权(B2),
      投票池为空 → unclear,不允许维持上一次档位(M17)。

  - name: crowding
    depends_on:
      - funding_rate_current
      - funding_rate_30d_percentile
      - oi_change_24h
      - long_short_ratio_change_24h
      - basis_annualized
      - put_call_ratio_oi
      - liquidation_density_index
    formula_ref: src/composite/crowding.py::compute
    layer: L4
    single_use_point: l4_risk_and_position_cap
    output_range: [0, 8]
    notes: >
      §3.8.3;v1.2 限定 L4,不进 L2,不进 L3 opportunity_grade,
      无方向反转含义。

  - name: macro_headwind
    depends_on:
      - dxy_20d_change
      - us10y_30d_change_bp
      - vix_current
      - nasdaq_20d_change
      - btc_nasdaq_corr_60d
    formula_ref: src/composite/macro_headwind.py::compute
    layer: L5
    single_use_point: l5_adjustment_guidance
    output_range: [-10, 10]
    notes: "§3.8.5;BTC-纳指相关性 > 0.7 时所有宏观项权重 × 1.5"

  - name: event_risk
    depends_on:
      - event_calendar_manual
      - btc_nasdaq_corr_60d
      - atr_percentile_180d                # 当前波动率 extreme 时所有事件分 +1
    formula_ref: src/composite/event_risk.py::compute
    layer: L4
    single_use_point: l4_position_cap_and_permission
    output_range: [0, 15]
    notes: "§3.8.6;事件窗口前 48h 生效(thresholds.layer_4_risk.event_window_activation_hours)"
