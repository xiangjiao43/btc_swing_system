# ============================================================
# scheduler.yaml — APScheduler 任务配置(Sprint 2.7-A 重写)
# ============================================================
# 时区改为 BJT(Asia/Shanghai),所有 cron 时间都按北京时间。
# 当前任务总览(含 disabled 项):
#   collect_klines_1h        每整点 :00,衍生品 1h + K 线 1h
#   collect_klines_daily     每天 08:01,1d/4h K 线
#   collect_klines_weekly    每周一 08:01,1w K 线
#   collect_macro            每天 06:00,FRED 9 个 series
#   collect_onchain          每天 08:35/09:35/10:35,Glassnode 3 档
#   layer_a_spot_strategy    每天 10:00 BJT,Layer A 大周期现货策略
#   pipeline_run_regular     每天 11:35 BJT,Layer B 主策略 pipeline
#   pipeline_run_8h_onchain  disabled,历史 8h 链上档
#   event_listener           60 秒高频,event_price / event_macro
#   hard_invalidation_monitor 每 1h 规则平仓检查
#   position_health_check    disabled,历史 4h 持仓体检
#   weekly_review            周日 22:00 BJT
#
# yaml 字段:
#   enabled              true/false。关掉即不注册到 scheduler。
#   func                 可选,默认 = job 名;允许多 yaml 条目共享同一函数
#                       (pipeline_run_regular + pipeline_run_8h_onchain
#                       都跑 pipeline_run)
#   interval             '60s' / '5m' / '1h' / '1d' interval trigger
#   cron                 dict,key 用 APScheduler CronTrigger kwargs
#                       (hour / minute / day / day_of_week)。
#   misfire_grace_time   错过触发的允许补跑秒数
#   coalesce             多次错过合并为一次
#   max_instances        并发上限(默认 1)
#
# Sprint 2.6-A 老配置(pipeline_run interval 4h + data_collection interval 1h)
# 已删除,Sprint 2.7-B 删除老的 job_data_collection 函数。
# ============================================================

timezone: 'Asia/Shanghai'

jobs:

  # ------------- 数据采集 ----------------------------

  collect_klines_1h:
    enabled: true
    cron: {minute: 0}                  # 每整点 :00 BJT
    misfire_grace_time: 240            # 4 分钟,不影响下个整点
    coalesce: true
    max_instances: 1
    description: '1h K 线 + 5 衍生品端点(1h interval, limit=168)'

  # Sprint 2.8-F:低频 collector 改多档 cron(主时刻 + 多个补救时刻),
  # 任一档成功后,job 入口 _has_today_* 检查会让后续档 status='skipped'。
  # 目的:API key 临时失效 / 网络抖动覆盖单个 cron 时,不再等下个周期。

  collect_klines_daily:
    enabled: true
    cron:                              # 08:01 主 + 9 个补救档(BJT)
      - {hour: 8, minute: 1}
      - {hour: 9, minute: 1}
      - {hour: 10, minute: 1}
      - {hour: 11, minute: 1}
      - {hour: 12, minute: 1}
      - {hour: 14, minute: 1}
      - {hour: 16, minute: 1}
      - {hour: 18, minute: 1}
      - {hour: 20, minute: 1}
    misfire_grace_time: 600
    coalesce: true
    max_instances: 1
    description: '1d / 4h K 线日级抓取(多档自动补救)'

  collect_klines_weekly:
    enabled: true
    cron:                              # 周一主 + 周一/二/三 补救档
      - {day_of_week: 'mon', hour: 8, minute: 1}
      - {day_of_week: 'mon', hour: 12, minute: 1}
      - {day_of_week: 'mon', hour: 16, minute: 1}
      - {day_of_week: 'mon', hour: 20, minute: 1}
      - {day_of_week: 'tue', hour: 8, minute: 1}
      - {day_of_week: 'tue', hour: 12, minute: 1}
      - {day_of_week: 'wed', hour: 8, minute: 1}
    misfire_grace_time: 1800
    coalesce: true
    max_instances: 1
    description: '1w K 线周级抓取(本周内多档补救)'

  collect_macro:
    enabled: true
    cron:                              # 06:00 主 + 06-12 每小时补救档(BJT)
      - {hour: 6, minute: 0}
      - {hour: 7, minute: 0}
      - {hour: 8, minute: 0}
      - {hour: 9, minute: 0}
      - {hour: 10, minute: 0}
      - {hour: 11, minute: 0}
      - {hour: 12, minute: 0}
    misfire_grace_time: 1800
    coalesce: true
    max_instances: 1
    description: 'FRED 9 个 series + alias(多档补救)'

  collect_onchain:
    enabled: true
    # Sprint 1.6.2(2026-05-17)错峰修正:旧 08:35/09:35/10:35(= 00:35/01:35/02:35 UTC)
    # 撞 Glassnode 全网 daily refresh 高峰(00:00 UTC 后约 30-90 分钟,alphanode
    # 中转站对热门 endpoint 如 puell_multiple 临时返 429)。
    # 配合 _fetcher_completed_today per-fetcher skip,2 档错峰已足够:
    # 主档失败的单 fetcher 在补救档自动重试,成功的不浪费 HTTP。
    # yaml hour 是 BJT(顶部 timezone: 'Asia/Shanghai')。
    cron:
      - {hour: 9,  minute: 30}         # BJT 09:30 主档(= 01:30 UTC,避开高峰)
      - {hour: 10, minute: 30}         # BJT 10:30 补救档(per-fetcher 只 retry 失败的)
    misfire_grace_time: 600
    coalesce: true
    max_instances: 1
    description: 'Glassnode 22 个 metric(2 档错峰:主 + 1 补救;per-fetcher skip)'

  # 批 3(2026-06-08):4 精选 Glassnode 指标(CVDD / ATM IV / Skew / Max Pain)
  # 单独 cron 避开 09:30/10:30 onchain 主档,留 ~15 分钟缓冲,
  # 并且赶在 11:00 用户日常查看 snapshot 前刷新好。
  # fetcher 间 5s 间隔,4 calls/天 ≈ 124 calls/月。
  collect_glassnode_extras:
    enabled: true
    cron: {hour: 10, minute: 50}       # BJT 10:50 = UTC 02:50
    misfire_grace_time: 600
    coalesce: true
    max_instances: 1
    description: '批 3:CVDD / ATM IV 1m / 25 Δ Skew 1m / Max Pain 1m'

  # ------------- Layer A / Layer B pipeline --------------------

  layer_a_spot_strategy:
    enabled: true
    # 北京时间 10:00 = UTC 02:00。Layer A 单独运行,避免与 11:35
    # Layer B 主策略连续调用 AI 导致 503 / 502 或长时间等待。
    cron: {hour: 10, minute: 0}
    misfire_grace_time: 300
    coalesce: true
    max_instances: 1
    description: 'Layer A 大周期现货策略(10:00 BJT 每日 1 档;Layer A 单一大周期裁决:四个数据包 + 一次 AI 调用 + Spot Validator + latest Layer A 持久化)'

  # v1.4 主裁决:每日 1 档,配合 BTC_USE_ORCHESTRATOR=true 走
  # src/ai/orchestrator.py(Layer B L1-L5 + Master + Validator 24)。
  # pipeline_run_8h_onchain 用户决策保持 disabled(8h 链上档是 v1.2 残余,
  # 1.9.1 持仓健康检查会重新设计)。
  pipeline_run_regular:
    enabled: true
    # Sprint F.1(2026-05-09):16:05 BJT → 11:35 BJT(= UTC 03:35)。
    # 用户中长线一天 1 次,16:05 太晚看不到。新时刻 11:35 在 Glassnode
    # 10:35 终档(Sprint C 3 档:8:35/9:35/10:35)+ 1h 缓冲后,
    # 配合 Sprint F.1 删 event_onchain enqueue,严守"一天 1 次 master"原则。
    cron: {hour: 11, minute: 35}
    misfire_grace_time: 300
    coalesce: true
    max_instances: 1
    description: 'Layer B 波段主循环(11:35 BJT 每日 1 档,run_trigger=scheduled;不自动运行 Layer A)'

  pipeline_run_8h_onchain:
    enabled: false
    cron: {hour: 8, minute: 40}        # 08:40 BJT(链上 08:35 抓完 + 5 分钟缓冲)
    misfire_grace_time: 300
    coalesce: true
    max_instances: 1
    description: 'Pipeline 8 点链上档(用户决策不启;1.9.1 重新设计持仓健康检查)'

  # ------------- 高频事件监听 ------------------------

  event_listener:
    enabled: true
    interval: '60s'                    # 60 秒高频常驻
    misfire_grace_time: 30
    coalesce: true
    max_instances: 1
    description: '事件触发器:event_macro(events_calendar 命中)+ event_price 双轨(±5% 空仓 / ±3% 持仓);1.10-G 后 event_invalidation 拆出 hard_invalidation_monitor 1h cron'

  # Sprint 1.10-G v1.4 §10.4.1 新增:硬失效位独立 1h cron(规则平仓,无 AI)
  hard_invalidation_monitor:
    enabled: true
    interval: '1h'
    misfire_grace_time: 60
    coalesce: true
    max_instances: 1
    description: 'event_invalidation:每 1h 检查 active thesis stop_loss 是否击穿 → 规则平仓(channel A,无 AI)'

  # Sprint 1.10-G v1.4 §10.4.1 新增:持仓期 4h 健康检查
  # Sprint 1.10-H D2=a:接通 EmergencySimplifiedA 真 AI(trigger='health_check' 区分场景)
  position_health_check:
    # Sprint E(2026-05-09)用户决策关闭(B=d):中长线 4h 持仓体检过密,且
    # 兜底机制已足够(price ±3% event_price / macro 事件 / hard_invalidation
    # 1h 规则平仓 / 11:35 scheduled 每日 master 复评)。关闭后 0 次/天此 AI
    # 调用。
    enabled: false
    interval: '4h'
    misfire_grace_time: 300
    coalesce: true
    max_instances: 1
    description: '持仓期 4h 健康检查(Sprint E disabled,详见 yaml 注释)'

  # Sprint 1.10-H v1.4 §3.3.9 + §8.1 新增:周复盘 AI(每周日 22:00 BJT)
  weekly_review:
    enabled: true
    cron: {day_of_week: 'sun', hour: 22, minute: 0}    # 周日 22:00 BJT
    misfire_grace_time: 3600                            # 1h 容忍度
    coalesce: true
    max_instances: 1
    description: '周复盘 AI(WeeklyReviewAnalyst);周日 22:00 BJT 自动跑,输出 4 段 JSON 写 weekly_reviews 表 + alerts'
