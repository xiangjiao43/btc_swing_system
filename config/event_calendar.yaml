# ============================================================
# PART 3 — UTC 基准事件(固定 UTC,不受夏令时影响)
# ============================================================
# §3.4.3 明确指定:以下三类事件用 UTC 存储。
utc_events:

  # ---------- 币安资金费率结算(UTC 00 / 08 / 16)----------
  # 每日 3 次,运行时代码展开为当日 3 个事件实例。
  - name: binance_funding_rate_settlement
    recurrence: daily
    times_utc: ["00:00", "08:00", "16:00"]
    timezone: "UTC"
    impact_level: 2
    notes: "资金费率结算后 15 分钟事件触发(base.yaml → event_driven.types.event_funding)"

  # ---------- Glassnode 日级数据更新(UTC 00:00)----------
  - name: glassnode_daily_update
    recurrence: daily
    times_utc: ["00:00"]
    timezone: "UTC"
    impact_level: 1
    notes: >
      北京 08:00 ≈ UTC 00:00;实际数据可用时间通常在北京 08:15-08:30
      (中转/清洗延迟),所以事件触发窗口在 UTC 00:15-00:30,见
      base.yaml → event_driven.types.event_onchain

  # ---------- 期权月度到期(每月最后一个周五 UTC 08:00)----------
