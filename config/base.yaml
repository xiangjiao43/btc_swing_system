# ============================================================
# base.yaml — 项目全局基础配置
# ============================================================
# 用途:存放"不会频繁改"的项目基础信息 —— 项目身份、时区、
#       运行模式、目录路径、Fallback 策略、冷启动。频繁调整的
#       阈值不放这里(放 thresholds.yaml),数据源配置也不放这里
#       (放 data_sources.yaml)。
#
# 创建于:2026-04-22(Sprint 1 前置工作 · 优化二第 1 批)
# 建模版本:v1.2
# ============================================================


# -------- 项目身份 ----------------------------------------------------
# 对应建模文档 7.x(StrategyState 头部字段)与 M36
project:
  # 项目名称,同时用作数据目录子项
  name: "btc_swing_system"

  # 系统版本:跟随 docs/modeling.md 的模型版本(主要反映架构/契约)。
  # 取值格式 "vMAJOR.MINOR";里程碑完成(v0.1/v0.2 等)时 bump。
  system_version: "v0.0.1"

  # 规则版本(M36 独立版本号):反映 L3 判档表、门槛表、CyclePosition
  # 九档、因子权重等"规则内容"的每次变更。
  # —— 任何规则内容改动必须 bump,哪怕 system_version 不变。
  # —— StrategyState 与 review_reports 均会记录本次运行使用的 rules_version。
  rules_version: "v1.2.0"

  # 人类可读的用途说明(用于日志头/报告头,不参与逻辑)
  description: >
    BTC 中长线低频双向波段交易辅助系统 —— 输出带证据链的 StrategyState,
    交易下单由人执行;系统本身不自动下单。


# -------- 时区配置(M39)---------------------------------------------
# 规则:所有存储统一 UTC;美国事件日历以 America/New_York 存储
# (因夏令时自动切换需要);展示层可换成北京时间。
timezone:
  # 数据库与内部 timestamp 的存储时区(所有 *_utc 字段)。
  storage: "UTC"

  # 美国宏观事件日历的原始时区(event_calendar.yaml 里写 New_York 时间,
  # 系统运行时再 zoneinfo 转 UTC)。夏令时自动切换由 zoneinfo 负责。
  us_events: "America/New_York"

  # 前端默认展示时区(用户是大陆用户,看北京时间更方便)。
  display: "Asia/Shanghai"


# -------- 运行模式 ----------------------------------------------------
# Sprint 1.10-J §X(commit 3):整段 runtime: 删除。
# 0 src/ 消费(grep 真核实);真权威源:
#   - cron 调度 → config/scheduler.yaml
#   - 事件触发节流 → config/base.yaml::event_trigger 段(1.10-G 加)
# 历史:1.10-G commit 1 已删 cron_hours_utc + throttle 段,本 commit 完成清理。


# -------- 目录路径(全部相对项目根)-----------------------------------
# 运行时代码统一从这里读取;不要在业务代码里硬写目录。
paths:
  data_dir: "data"               # 存放 SQLite、缓存、临时下载
  db_path: "data/btc_strategy.db"  # v0.x SQLite;v1.0 切 Postgres 再改
  log_dir: "data/logs"           # 运行日志(按天轮转)
  config_dir: "config"
  fixtures_dir: "tests/fixtures"  # 测试快照(Sprint 1 前置工作优化三产出)
  docs_dir: "docs"


# -------- 日志 -------------------------------------------------------
logging:
  # DEBUG / INFO / WARNING / ERROR —— 也可由 .env 的 LOG_LEVEL 覆盖
  level: "INFO"
  # 文件轮转:按天切割,保留 N 天
  rotation_when: "D"
  rotation_backup_count: 30
  # 每条日志附带的通用字段(便于追溯)
  include_fields:
    - run_id
    - reference_timestamp_utc
    - fallback_level
    - rules_version


# -------- Fallback 三档(M33)----------------------------------------
# 详见建模文档 §6.9。这里只配置"触发阈值"和"开关",每档的
# 业务行为(保持/清挂单/强制 watch/强制 protection)写在代码里,
# 不可 YAML 化。
fallback:
  # 是否全局启用 Fallback 机制。关掉仅用于调试,生产必须开启。
  enabled: true

  level_1:
    # AI 校验失败连续 N 次 → 触发 L1
    ai_validation_failures_threshold: 1
    # L1 连续触发 ≥ N 次 → 自动升级 L2(v1.2 新增)
    auto_upgrade_to_l2_consecutive: 5
    # 告警级别(warning / critical)
    alert_severity: "warning"

  level_2:
    # AI 连续失败 ≥ N 次 → 触发 L2
    ai_consecutive_failures_threshold: 3
    # 数据源全 stale 数量 ≥ N → 触发 L2(对齐 §3.2.4)
    stale_sources_threshold: 3
    # 进入 L2 后等待 N 秒无恢复 → 考虑 L3
    wait_before_l3_sec: 7200
    alert_severity: "critical"

  level_3:
    # 数据源完全失效 > N 秒 → 触发 L3
    data_outage_threshold_sec: 7200
    # 触发 L3 后是否停止自动调度(只留 manual)
    stop_scheduled_on_trigger: true
    alert_severity: "critical"


# -------- 冷启动(已删,Sprint 1.10-J commit 6 §X)-----------------------
# v1.4 §11.2 删 cold_start 字段及所有相关逻辑。冷启动期早过去,系统稳定运行。
# 老配置块整删:enabled / backfill_days / warming_up_days / warming_up_runs /
#               during_warming_up.* 全部 0 src/ 消费(grep 真核实)。


# -------- 低频保守边界(M25 监控常量)---------------------------------
# 不是用来影响决策的,只用于监控模块判断"过度保守"。
# 具体监控逻辑在 src/monitoring/ 下实现,这里是阈值常量。
low_frequency_guard:
  # 连续 > N 天无 PLANNED 迁移 → 告警"过度保守"
  max_days_without_planned: 90
  # position_cap final 连续 ≥ N 次 < threshold 视为过度保守
  consecutive_low_cap_runs: 10
  consecutive_low_cap_threshold: 0.20


# -------- v1.4 虚拟账户(Sprint 1.10-A,见 docs/modeling.md §5.1 / §10.4.3)----
# 虚拟账户初始化参数(scripts/init_v14_tables.py 读取此段写第一行 snapshot)
virtual_account:
  # 初始本金(USDT 计价),首次部署后写入 virtual_account.initial_capital
  # 永久不变;后续 total_return_pct 基于此计算
  initial_capital: 100000
  # 计价货币(本 v1.4 仅 USDT,留字段为以后扩展)
  currency: "USDT"


# -------- v1.4 挂单引擎(Sprint 1.10-A,见 docs/modeling.md §5.2 / §10.4.3)----
# DAO 创建 virtual_orders 时 expires_at_utc 由调用方算
# (created_at_utc + default_expiry_days * 86400)。v1.4 §5.2.6 默认 7 天
virtual_orders:
  # 挂单默认有效期(天)。过期由 mark_expired 批量标 cancelled,reason='expired'
  default_expiry_days: 7


# -------- v1.4 AI 重试机制(Sprint 1.10-F,见 docs/modeling.md §6.3)----
# orchestrator 层失败重试(整层/整次 run 失败 → 等 5/10/20 分钟跨 cron 重试)
# 注:不同于 BaseAgent._call_ai_with_retry 的 2-attempt 即时重试(API 网络抖动)
ai_retry:
  # Sprint F.2(2026-05-09)用户决策:5/10/20 间隔 + 2h 窗口对中长线太密。
  # 改为 30/60/60 分钟 + 3h 窗口。预期重试时间表(假设 BJT 11:35 失败):
  #   12:05 retry 1(+30min) → 13:05 retry 2(+60min)
  #   → 14:05 retry 3(+60min) → 14:35 放弃,等次日 11:35。
  intervals_minutes: [30, 60, 60]
  # 单层最多重试次数(超过 → 短路下游)
  max_attempts_per_layer: 3
  # 整次 run 总窗口(小时):超过 → 放弃所有重试,fallback Level 2
  total_window_hours: 3

  # V22 master 连续失败检测(D2=a 滑动 72h)
  master_consecutive_fail:
    # 检测窗口(小时):72h(滑动,非自然日,避跨 0:00 边界歧义)
    window_hours: 72
    # 触发 review_pending 阈值(连续失败次数)
    threshold: 3


# -------- 事件触发(v1.4 §6.2.3 + §10.4.3,Sprint 1.10-G)---------
# 双轨设计(继承 v1.3 §5.2):
# - 空仓 / planned / cooldown:风险低,5% 才响应
# - 持仓中(opened/holding/trim):风险高,3% 就响应
# baseline_price 取上次任一 strategy_run 的 BTC 价格(D1=b,Sprint 1.10-G 改造
# 2.7-D 现有 24h 滚动 → 上次 run 决策窗口语义,§6.2.3 节流"距上次主 AI 介入 <
# 30min 跳过"暗示 baseline 应是上次 run)。
# §X:本段是事件触发节流的单一配置源。已删 runtime.event_driven.throttle 老路径。
event_trigger:
  # 双轨阈值
  price_pct_flat: 0.05              # 空仓 / planned / cooldown 状态
  price_pct_holding: 0.03           # 持仓中(opened/holding/trim)
  # 节流(D2=b:event_price_* 一类 + event_invalidation 另一类,两类独立计数)
  event_cooldown_seconds: 7200      # 同类事件 2h 节流(event_price 类内独立)
  skip_if_recent_scheduled_seconds: 1800   # 距上次主 AI 介入 < 30min 跳过
