# ============================================================
# lifecycle_fsm.yaml — Sprint 1.14b 交易生命周期 FSM(14 状态)
# ============================================================
# 用途:根据 adjudicator.action + 当前 lifecycle_state,声明式地决定
#       下一个 lifecycle 状态。与 config/state_machine.yaml(系统运行
#       状态分类器,14 档)相互独立。
#
# 字段语义:
#   transitions.<state>.<action>        → 显式映射到的目标状态
#   transitions.<state>._default        → action 不在表中时的兜底
#   transitions.<state>._auto_after_minutes
#     + transitions.<state>._auto_target → 进入该状态满 N 分钟后无条件迁移
#
# 评估顺序(lifecycle_fsm.py):
#   1) _auto_after_minutes 若已到期 → 走 _auto_target(优先级最高)
#   2) 否则按 action 查表 → 找不到走 _default → 没有 _default 保持原状态
#
# 不处理执行层(下单 / 撤单)。Sprint 2+ 单独实现。
#
# 创建于:2026-04-24(Sprint 1.14b)
# 建模版本:v1.2(Sprint 1.14 版 FSM)
# ============================================================

version: '1.0.0'

transitions:

  # ========== FLAT ==========
  FLAT:
    open_long:   LONG_PLANNED
    open_short:  SHORT_PLANNED
    _default:    FLAT

  # ========== LONG 侧 ==========
  LONG_PLANNED:
    open_long:      LONG_OPEN
    scale_in_long:  LONG_OPEN
    close_long:     FLAT
    watch:          LONG_PLANNED
    pause:          COOLDOWN
    _default:       LONG_PLANNED

  LONG_OPEN:
    scale_in_long:  LONG_SCALING
    reduce_long:    LONG_REDUCING
    close_long:     LONG_CLOSED
    hold:           LONG_OPEN
    pause:          COOLDOWN
    _default:       LONG_OPEN

  LONG_SCALING:
    scale_in_long:  LONG_SCALING
    hold:           LONG_OPEN
    reduce_long:    LONG_REDUCING
    close_long:     LONG_CLOSED
    _default:       LONG_SCALING

  LONG_REDUCING:
    reduce_long:    LONG_REDUCING
    hold:           LONG_OPEN
    close_long:     LONG_CLOSED
    _default:       LONG_REDUCING

  LONG_CLOSED:
    _auto_after_minutes: 60
    _auto_target:        FLAT

  # ========== SHORT 侧(对称)==========
  SHORT_PLANNED:
    open_short:     SHORT_OPEN
    scale_in_short: SHORT_OPEN
    close_short:    FLAT
    watch:          SHORT_PLANNED
    pause:          COOLDOWN
    _default:       SHORT_PLANNED

  SHORT_OPEN:
    scale_in_short: SHORT_SCALING
    reduce_short:   SHORT_REDUCING
    close_short:    SHORT_CLOSED
    hold:           SHORT_OPEN
    pause:          COOLDOWN
    _default:       SHORT_OPEN

  SHORT_SCALING:
    scale_in_short: SHORT_SCALING
    hold:           SHORT_OPEN
    reduce_short:   SHORT_REDUCING
    close_short:    SHORT_CLOSED
    _default:       SHORT_SCALING

  SHORT_REDUCING:
    reduce_short:   SHORT_REDUCING
    hold:           SHORT_OPEN
    close_short:    SHORT_CLOSED
    _default:       SHORT_REDUCING

  SHORT_CLOSED:
    _auto_after_minutes: 60
    _auto_target:        FLAT

  # ========== 事件驱动终止状态 ==========
  STOP_TRIGGERED:
    _auto_after_minutes: 120
    _auto_target:        FLAT_AFTER_STOP

  FLAT_AFTER_STOP:
    _auto_after_minutes: 240
    _auto_target:        FLAT

  COOLDOWN:
    _auto_after_minutes: 60
    _auto_target:        FLAT
