# ============================================================
# event_calendar.yaml — 事件日历(手动维护,每年 12 月更新下一年)
# ============================================================
# 用途:
#   - 所有美国宏观事件(FOMC / CPI / NFP / ...)按"美国东部时间"存储
#   - 所有 UTC 基准事件(资金费率结算 / Glassnode 日更新 / 期权到期)按 UTC 存储
#   - 减半事件独立登记
#   - 事件名 → 类型映射,衔接 thresholds.yaml → event_risk_scoring.event_type_weights
#
# 硬纪律(§3.4.1,M39):
#   * 美国事件 timezone 必须是 America/New_York(夏令时 zoneinfo 自动切换)
#   * UTC 事件 timezone 必须是 UTC
#   * 绝不直接存北京时间
#
# 维护纪律(§3.4.4):
#   * 每年 12 月人工更新下一年度日程
#   * 来源:federalreserve.gov / bls.gov / 交易所财经日历
#   * 对于具体日期未公布的条目,date 写 "TBD_CHECK_FED_SITE",
#     notes 注明核对来源,**不要**虚构日期
#
# 编码读取(§3.4.5):
#   * Python zoneinfo 做时区转换
#   * 单元测试覆盖"夏令时切换日前后各 3 天"(tests/timezone_dst_test.py)
#   * 加载失败时:仅运行定时整点 6 次,不执行事件触发;推送 warning
#
# impact_level 分级(1-5,影响力粗估):
#   5 = 顶级(FOMC / CPI / Core CPI)
#   4 = 高(NFP / FOMC minutes / Powell 讲话)
#   3 = 中(PPI / GDP / Retail Sales)
#   2 = 低(ADP / 期权月度到期 / Consumer Confidence)
#   1 = 信息(一般数据点)
#
# 创建于:2026-04-23(Sprint 1 前置工作 · 优化二第 4 批)
# 建模版本:v1.2
# 日历覆盖年度:2026
# ============================================================


# ============================================================
# PART 1 — 事件名 → event_type 映射
# ============================================================
# 运行时代码:
#   event_type = event_type_mapping[event.name]  # 找到 type
#   base_weight = thresholds.event_risk_scoring.event_type_weights[event_type]
# 未在映射表中的事件走 other(weight 1)。
# 本表尽量覆盖常见事件名,减少 other 的兜底频率(§6.批 2 注释)。

event_type_mapping:
  # ---- FOMC 族(全部 map 到 fomc = weight 4)----
  FOMC_decision:            fomc
  FOMC_statement:           fomc
  FOMC_press_conference:    fomc
  FOMC_minutes:             fomc
  FOMC_economic_projections: fomc
  Powell_speech:            fomc
  Powell_testimony:         fomc
  Fed_official_speech:      fomc

  # ---- CPI 族(map 到 cpi = weight 3)----
  CPI:                      cpi
  Core_CPI:                 cpi
  CPI_YoY:                  cpi
  CPI_MoM:                  cpi

  # ---- NFP 族(map 到 nfp = weight 3)----
  NFP:                      nfp
  Nonfarm_Payrolls:         nfp
  Unemployment_Rate:        nfp
  Average_Hourly_Earnings:  nfp

  # ---- 期权到期(map 到 options_expiry_major = weight 2)----
  Options_expiry_monthly:   options_expiry_major
  Options_expiry_quarterly: options_expiry_major
  BTC_options_expiry:       options_expiry_major

  # ---- 其他数据(map 到 other = weight 1)----
  PPI:                      other
  Core_PPI:                 other
  Retail_Sales:             other
  Core_Retail_Sales:        other
  ADP:                      other
  ADP_Employment_Change:    other
  GDP:                      other
  GDP_advance:              other
  GDP_revision:             other
  ISM_Manufacturing:        other
  ISM_Services:             other
  Consumer_Confidence:      other
  Michigan_Consumer_Sentiment: other
  JOLTS:                    other
  Initial_Jobless_Claims:   other


# ============================================================
# PART 2 — 美国宏观事件(America/New_York 时区)
# ============================================================
# 字段:
#   name:           事件名(必须在 event_type_mapping 里有映射)
#   date:           YYYY-MM-DD(或 "TBD_CHECK_FED_SITE" 占位)
#   local_time:     "HH:MM"(24h 制,ET 当地时间)
#   timezone:       "America/New_York"(强制,不可改)
#   impact_level:   1-5
#   notes:          人类备注;占位日期必须注明核对来源
#
# 2026 年覆盖:FOMC 8 次 / CPI 12 次 / NFP 12 次 / GDP 4 次 / PPI 12 次
