<!DOCTYPE html>
<html lang="zh-CN" x-data="app()" x-init="init()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC 策略审计台</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Inter"', '"PingFang SC"', '"Microsoft YaHei"',
                   'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"SF Mono"', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>
  <script src="/assets/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>

<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100
             font-sans antialiased transition-colors min-h-screen">

  <!-- ============================================================ -->
  <!-- Sticky Top Nav                                               -->
  <!-- ============================================================ -->
  <header class="sticky top-0 z-30 border-b border-slate-200 dark:border-slate-800
                 bg-white/95 dark:bg-slate-950/95 backdrop-blur">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 h-10 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-600 dark:bg-cyan-400"></span>
        <span class="text-[13px] font-semibold tracking-tight">BTC Strategy</span>
        <span class="hidden sm:inline text-[11px] text-slate-500 dark:text-slate-400">策略审计台</span>
      </div>
      <div class="flex items-center gap-3 text-[11px]">
        <span class="hidden sm:inline font-mono"
              :class="dataSource === 'api' ? 'text-emerald-600 dark:text-emerald-400'
                                           : 'text-amber-600 dark:text-amber-400'"
              x-text="dataSourceLabel"></span>
        <span class="font-mono tabular-nums text-slate-600 dark:text-slate-400"
              x-text="nowBjt"></span>
        <button @click="toggleDark()"
                class="w-7 h-7 rounded flex items-center justify-center
                       hover:bg-slate-100 dark:hover:bg-slate-800 transition"
                :title="darkMode ? '切换到白天' : '切换到夜间'">
          <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <template x-if="loading">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 py-6 text-xs text-slate-500">加载中…</div>
  </template>
  <template x-if="error">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 py-6 text-xs text-rose-600">
      加载失败:<span x-text="error"></span>
    </div>
  </template>
  <template x-if="!loading && state && dataSource === 'mock'">
    <div class="bg-amber-50 dark:bg-amber-950/40 border-b border-amber-200 dark:border-amber-900/50
                text-amber-900 dark:text-amber-200 text-[11px] px-3 lg:px-4 py-1.5">
      <strong>MOCK 数据</strong>:/api/strategy/current 暂不可用,回退到 mock JSON(开发预览用)。
    </div>
  </template>

  <template x-if="!loading && state">
  <main class="max-w-7xl mx-auto px-3 lg:px-4 py-3 lg:py-4 space-y-4">

    <!-- ============================================================ -->
    <!-- 顶部全局状态条(§9.3)                                        -->
    <!-- ============================================================ -->
    <section class="audit-card px-3 py-2">
      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 items-center">
        <div class="col-span-2 md:col-span-1 lg:col-span-2">
          <div class="stat-label flex items-center gap-1.5">
            <span>BTC 价格</span>
            <span class="text-[8.5px] normal-case text-slate-400 dark:text-slate-500 tracking-normal">
              实时 · 每分钟更新
            </span>
          </div>
          <div class="flex items-baseline gap-1.5">
            <span class="text-xl lg:text-2xl font-mono font-bold tabular-nums"
                  x-text="formatPrice(livePrice())"></span>
            <span class="text-[11px] font-mono tabular-nums"
                  :class="(livePrice24hChange() ?? 0) >= 0
                           ? 'text-emerald-600 dark:text-emerald-400'
                           : 'text-rose-600 dark:text-rose-400'"
                  x-text="formatPct(livePrice24hChange(), true)"></span>
          </div>
          <div class="text-[10px] text-slate-500 dark:text-slate-400 flex items-center gap-1">
            <span x-text="'采集 ' + (livePriceCapturedAt() || '—')"></span>
            <span x-show="livePriceStale()" class="text-amber-600 dark:text-amber-400"
                  title="价格数据 > 30 分钟">·stale</span>
          </div>
        </div>
        <div>
          <div class="stat-label">状态</div>
          <span class="inline-block px-1.5 py-0.5 rounded text-[13px] font-bold font-mono"
                :class="stateColor(state.main_strategy.action_state)"
                x-text="state.main_strategy.action_state"></span>
        </div>
        <div>
          <div class="stat-label">生命周期</div>
          <div class="text-[13px]" x-text="state.main_strategy.lifecycle_phase || '—'"></div>
        </div>
        <div>
          <div class="stat-label">机会 / 许可</div>
          <div class="text-[13px] font-mono"
               x-text="(state.main_strategy.opportunity_grade || '—') + ' / ' +
                       (state.main_strategy.execution_permission || '—')"></div>
        </div>
        <div>
          <div class="stat-label">观察类别</div>
          <span class="inline-block px-1.5 py-0.5 rounded-full text-[10.5px]"
                :class="observationColor(state.main_strategy.observation_category)"
                x-text="observationLabel(state.main_strategy.observation_category)"></span>
        </div>
        <div>
          <div class="stat-label">下次运行</div>
          <div class="text-[13px] font-mono tabular-nums" x-text="countdownLabel"></div>
        </div>
        <div class="col-span-2 md:col-span-1">
          <div class="stat-label">数据 / Fallback</div>
          <div class="flex items-center gap-1.5 text-[11px]">
            <span class="inline-block w-1.5 h-1.5 rounded-full"
                  :class="healthColor(state.data_health && state.data_health.overall)"></span>
            <span class="font-mono tabular-nums"
                  x-text="(state.data_health && state.data_health.data_completeness_pct != null
                           ? state.data_health.data_completeness_pct.toFixed(0) + '%'
                           : '—')"></span>
            <span class="text-slate-400">|</span>
            <span :class="fallbackLabelClass(state.meta && state.meta.fallback_level)"
                  x-text="fallbackLabel(state.meta && state.meta.fallback_level)"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 🎯 区域 1:AI 策略建议                                       -->
    <!-- ============================================================ -->
    <section id="region-1" class="audit-card">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>🎯</span><span>AI 策略建议</span>
        </h2>
      </header>

      <!-- 布局铁律:所有并排单元必须等宽 + 内容量差距 < 30%,
           差距大的拆成"上下多行全宽"。Sprint 2.3 R2 统一 7 行纯网格。-->
      <div class="p-4 space-y-4">

        <!-- ▸ Row 1(3 列等宽):方向 / 机会等级 / 执行许可 -->
        <div class="grid grid-cols-3 gap-3">
          <div class="border border-slate-200 dark:border-slate-800 rounded p-2">
            <div class="stat-label">方向</div>
            <div class="text-xl font-bold font-mono mt-0.5"
                 :class="directionHeroClass(strategyDirection())"
                 x-text="directionHeroLabel(strategyDirection())"></div>
          </div>
          <div class="border border-slate-200 dark:border-slate-800 rounded p-2">
            <div class="stat-label">机会等级</div>
            <div class="flex items-baseline gap-1.5 mt-0.5">
              <span class="text-xl font-bold font-mono"
                    x-text="state.main_strategy.opportunity_grade || 'none'"></span>
              <span class="text-[11px] text-slate-500"
                    x-text="gradeLabel(state.main_strategy.opportunity_grade)"></span>
            </div>
          </div>
          <div class="border border-slate-200 dark:border-slate-800 rounded p-2">
            <div class="stat-label">执行许可</div>
            <div class="mt-0.5">
              <span class="inline-block px-1.5 py-0.5 rounded text-xl font-bold font-mono"
                    :class="permissionClass(state.main_strategy.execution_permission)"
                    x-text="state.main_strategy.execution_permission || 'watch'"></span>
            </div>
          </div>
        </div>

        <!-- ▸ Row 2(4 列等宽):交易计划 — 入场 / 止损 / 止盈 / 仓位上限 -->
        <div>
          <div class="flex items-center justify-between mb-1">
            <h3 class="subheading m-0 border-0 p-0">交易计划</h3>
            <span class="text-[10px] px-1.5 py-0.5 rounded font-mono"
                  :class="tradePlanTierClass(tp().confidence_tier)"
                  x-text="tp().confidence_tier
                          ? tradePlanTierLabel(tp().confidence_tier)
                          : '无 · 待条件满足'"></span>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-[12px]">
            <div class="border border-slate-200 dark:border-slate-800 rounded p-2">
              <div class="stat-label">入场区间(分批)</div>
              <template x-if="(tp().entry_zones || []).length > 0">
                <div class="space-y-0.5 mt-0.5">
                  <template x-for="(z, i) in (tp().entry_zones || [])" :key="i">
                    <div class="font-mono leading-tight"
                         x-text="'#' + (i+1) + ' $' + z.price_low + '-' + z.price_high
                                 + ' (' + z.allocation_pct + '%)'"></div>
                  </template>
                </div>
              </template>
              <div x-show="!(tp().entry_zones || []).length"
                   class="text-slate-400 mt-0.5">待条件满足</div>
            </div>
            <div class="border border-slate-200 dark:border-slate-800 rounded p-2">
              <div class="stat-label">止损</div>
              <div class="font-mono text-rose-600 dark:text-rose-400 mt-0.5 leading-tight"
                   x-text="tp().stop_loss != null
                           ? ('$' + tp().stop_loss)
                           : '待条件满足'"></div>
              <div class="text-[10px] text-slate-500 leading-tight"
                   x-text="tp().stop_loss != null ? (stopLossBasis() || '4H 收盘确认') : ''"></div>
            </div>
            <div class="border border-slate-200 dark:border-slate-800 rounded p-2">
              <div class="stat-label">止盈(分批)</div>
              <template x-if="(tp().take_profit_plan || []).length > 0">
                <div class="space-y-0.5 mt-0.5">
                  <template x-for="(t, i) in (tp().take_profit_plan || [])" :key="i">
                    <div class="font-mono text-emerald-600 dark:text-emerald-400 leading-tight"
                         x-text="'TP' + (i+1) + ' $' + t.price + ' × ' + t.size_pct + '%'"></div>
                  </template>
                </div>
              </template>
              <div x-show="!(tp().take_profit_plan || []).length"
                   class="text-slate-400 mt-0.5">待条件满足</div>
            </div>
            <div class="border border-slate-200 dark:border-slate-800 rounded p-2">
              <div class="stat-label">建议仓位上限</div>
              <div class="font-mono text-base mt-0.5"
                   x-text="tp().max_position_size_pct != null
                           ? (tp().max_position_size_pct + '%')
                           : '—'"></div>
              <div class="text-[10px] text-slate-500 leading-tight"
                   x-text="positionCapExplain()"></div>
            </div>
          </div>
        </div>

        <!-- ▸ Row 3(全宽):策略说明 -->
        <div>
          <h3 class="subheading">策略说明</h3>
          <p class="text-[13px] leading-relaxed mt-1 text-slate-800 dark:text-slate-200"
             x-text="(state.ai_verdict && state.ai_verdict.narrative)
                     || strategyFallbackNarrative()"></p>
        </div>

        <!-- ▸ Row 4(2 列等宽):支持论据 | 反向论据 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div class="border border-slate-200 dark:border-slate-800 rounded p-3">
            <h3 class="subheading border-0 p-0 mb-1.5
                       flex items-center gap-1.5">
              <span class="text-emerald-500">▸</span><span>支持论据</span>
            </h3>
            <ul class="space-y-1">
              <template x-for="d in primaryDriversDisplay()" :key="d.text">
                <li class="flex items-start gap-1.5 text-[12px] leading-snug">
                  <span class="text-emerald-500 mt-0.5 shrink-0">•</span>
                  <span>
                    <span x-text="d.text"></span>
                    <a x-show="d.evidence_ref" class="ml-1 text-[10px] font-mono text-slate-500
                              underline decoration-dotted cursor-pointer"
                       @click.prevent="jumpToCard(d.evidence_ref)"
                       x-text="d.evidence_ref"></a>
                  </span>
                </li>
              </template>
            </ul>
          </div>
          <div class="border border-slate-200 dark:border-slate-800 rounded p-3">
            <h3 class="subheading border-0 p-0 mb-1.5
                       flex items-center gap-1.5">
              <span class="text-rose-400">◂</span><span>反向论据</span>
            </h3>
            <ul class="space-y-1">
              <template x-for="c in counterArgumentsDisplay()" :key="c.text">
                <li class="flex items-start gap-1.5 text-[12px] leading-snug">
                  <span class="text-rose-400 mt-0.5 shrink-0">•</span>
                  <span x-text="c.text"></span>
                </li>
              </template>
            </ul>
          </div>
        </div>

        <!-- ▸ Row 5(3 列等宽):硬失效位 | 事件风险 | 活跃风险标签 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div class="border border-slate-200 dark:border-slate-800 rounded p-3">
            <h3 class="subheading border-0 p-0 mb-1.5
                       flex items-center gap-1.5">
              <span class="inline-block w-0.5 h-3 bg-rose-500"></span>
              <span>硬失效位</span>
            </h3>
            <ul class="space-y-0.5 font-mono text-[11.5px]">
              <template x-for="h in hardInvalidationLevels()" :key="h.price">
                <li class="flex items-center gap-1.5">
                  <span class="px-1 rounded text-[9px]"
                        :class="h.priority === 1
                                ? 'bg-rose-100 dark:bg-rose-950 text-rose-800 dark:text-rose-300'
                                : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400'"
                        x-text="'P' + h.priority"></span>
                  <span x-text="'$' + h.price"></span>
                  <span class="text-slate-500"
                        x-text="'(' + (h.basis || '—') + ')'"></span>
                </li>
              </template>
              <li x-show="hardInvalidationLevels().length === 0"
                  class="text-slate-400">待有方向后自动给出</li>
            </ul>
          </div>
          <div class="border border-slate-200 dark:border-slate-800 rounded p-3">
            <h3 class="subheading border-0 p-0 mb-1.5">未来 72h 事件</h3>
            <ul class="space-y-0.5 text-[11.5px]">
              <template x-for="e in eventWindows()" :key="e.event_name">
                <li class="flex items-center gap-1.5">
                  <span class="inline-block w-1 h-1 rounded-full"
                        :class="e.in_window ? 'bg-rose-500' : 'bg-slate-400'"></span>
                  <span x-text="e.event_name"></span>
                  <span class="font-mono text-slate-500 tabular-nums"
                        x-text="e.hours_to != null ? (e.hours_to.toFixed(0) + 'h') : ''"></span>
                </li>
              </template>
              <li x-show="eventWindows().length === 0" class="text-slate-400">72h 内无登记事件</li>
            </ul>
          </div>
          <div class="border border-slate-200 dark:border-slate-800 rounded p-3">
            <h3 class="subheading border-0 p-0 mb-1.5">活跃风险标签</h3>
            <div class="flex flex-wrap gap-1">
              <template x-for="t in activeRiskTags()" :key="t">
                <span class="px-1.5 py-0 rounded text-[10.5px]
                             bg-amber-100 dark:bg-amber-950 text-amber-800 dark:text-amber-300 font-mono"
                      x-text="t"></span>
              </template>
              <span x-show="activeRiskTags().length === 0"
                    class="text-[11.5px] text-slate-400">无</span>
            </div>
          </div>
        </div>

        <!-- ▸ Row 6(全宽):什么会改变判断 -->
        <div>
          <h3 class="subheading">什么会改变判断</h3>
          <ul class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-0.5
                     font-mono text-[11.5px] mt-1 leading-snug">
            <template x-for="w in whatWouldChangeMindDisplay()" :key="w">
              <li class="flex items-start gap-1.5">
                <span class="text-blue-500 dark:text-cyan-400 shrink-0">▹</span>
                <span x-text="w"></span>
              </li>
            </template>
          </ul>
        </div>

        <!-- ▸ Row 7(全宽,一行小字):现货解读 + 生成时间 -->
        <div class="flex flex-wrap items-center justify-between gap-2 text-[10.5px]
                    text-slate-500 dark:text-slate-500 border-t
                    border-slate-200 dark:border-slate-800 pt-2 leading-snug">
          <span>
            <strong class="text-slate-600 dark:text-slate-400">现货用户</strong>:本策略面向合约波段;若用于现货,short = 清仓,long = 加仓。
          </span>
          <span class="font-mono">
            <span x-text="state.meta && state.meta.generated_at_bjt"></span>
            <span class="text-slate-300 dark:text-slate-600 mx-1">|</span>
            <span x-text="'由 ' + (state.meta && state.meta.ai_model_actual || 'rule-based') + ' 生成'"></span>
          </span>
        </div>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 📊 区域 2:五层证据链(讲述式)                              -->
    <!-- ============================================================ -->
    <section id="region-2" class="audit-card">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>📊</span><span>AI 分析过程 · 五层证据链</span>
        </h2>
        <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5">
          从 L1 市场状态开始,逐层推理到 L5 宏观背景,最后由 L3 判定机会等级。
        </p>
      </header>
      <ul class="divide-y divide-slate-100 dark:divide-slate-800">
        <template x-for="layer in orderedLayers()" :key="layer.layer_id">
          <li class="p-4 space-y-2">
            <!-- layer header -->
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-mono font-semibold text-sm" x-text="'L' + layer.layer_id"></span>
              <span class="font-medium" x-text="layerChineseName(layer.layer_id) + '层'"></span>
              <span class="text-[10px] px-1.5 py-0 rounded"
                    :class="contributionClass(layer.contribution)"
                    x-text="contributionLabel(layer.contribution)"></span>
              <span class="text-[10px] px-1.5 py-0 rounded bg-slate-100 dark:bg-slate-800
                           text-slate-600 dark:text-slate-400"
                    x-text="'健康: ' + (layer.health_status || '—')"></span>
              <span class="text-[10px] px-1.5 py-0 rounded"
                    :class="layer.data_freshness === 'green'
                            ? 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300'
                            : layer.data_freshness === 'yellow'
                            ? 'bg-amber-50 text-amber-700 dark:bg-amber-950 dark:text-amber-300'
                            : 'bg-rose-50 text-rose-700 dark:bg-rose-950 dark:text-rose-300'"
                    x-text="'新鲜度: ' + (layer.data_freshness || '—')"></span>
              <span class="ml-auto text-[10px] font-mono text-slate-500 tabular-nums"
                    x-text="'置信 ' + (layer.confidence_numeric != null
                            ? (layer.confidence_numeric * 100).toFixed(0) + '%'
                            : '—')"></span>
            </div>

            <!-- 【这层回答】 -->
            <div class="text-[12px]">
              <span class="text-[10px] uppercase tracking-wider text-slate-500">【这层回答】</span>
              <span class="ml-1" x-text="layer.core_question || '—'"></span>
            </div>

            <!-- 三支柱 / 四角度 / L3 rule_trace -->
            <template x-if="(layer.pillars || []).length > 0">
              <div>
                <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-1"
                     x-text="layer.layer_id === 4 ? '【分析的三个角度】'
                             : layer.layer_id === 5 ? '【四类分析】'
                             : '【分析的三个支柱】'"></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                  <template x-for="(p, i) in (layer.pillars || [])" :key="p.id">
                    <div class="border border-slate-200 dark:border-slate-800 rounded p-2 text-[11.5px]">
                      <div class="flex items-center justify-between">
                        <span class="font-medium" x-text="'① ② ③ ④ ⑤'.charAt(i*2) + ' ' + p.name"></span>
                        <span class="text-[9px] px-1 rounded"
                              :class="p.status === 'ok'
                                      ? 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300'
                                      : 'bg-amber-50 text-amber-700 dark:bg-amber-950 dark:text-amber-300'"
                              x-text="p.status"></span>
                      </div>
                      <div class="text-slate-700 dark:text-slate-300 mt-0.5 leading-snug"
                           x-text="p.interpretation"></div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- L3 rule_trace -->
            <template x-if="layer.layer_id === 3 && layer.rule_trace">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-[11.5px]">
                <div>
                  <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-1">
                    【规则匹配】
                  </div>
                  <div class="font-mono bg-slate-50 dark:bg-slate-900 p-2 rounded leading-snug"
                       x-text="layer.rule_trace.matched_rule"></div>
                </div>
                <div>
                  <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-1">
                    【升档条件(什么能让档位往上走)】
                  </div>
                  <ul class="space-y-0.5">
                    <template x-for="c in (layer.rule_trace.upgrade_conditions || [])" :key="c">
                      <li class="flex gap-1"><span class="text-blue-500">→</span>
                        <span x-text="c"></span></li>
                    </template>
                  </ul>
                </div>
              </div>
            </template>

            <!-- L4 position_cap chain + permission chain -->
            <template x-if="layer.layer_id === 4 && layer.position_cap_chain">
              <div class="text-[11px] bg-slate-50 dark:bg-slate-900 p-2 rounded font-mono
                          leading-snug overflow-x-auto">
                <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-0.5 not-mono">
                  【position_cap 合成链】
                </div>
                <span x-text="positionCapChainText(layer.position_cap_chain)"></span>
              </div>
            </template>
            <template x-if="layer.layer_id === 4 && layer.permission_chain">
              <div class="text-[11px] bg-slate-50 dark:bg-slate-900 p-2 rounded
                          leading-snug">
                <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-0.5">
                  【permission 归并】
                </div>
                <div x-text="permissionChainText(layer.permission_chain)"></div>
              </div>
            </template>

            <!-- L5 adjustment -->
            <template x-if="layer.layer_id === 5 && (layer.completeness_warning || layer.macro_stance)">
              <div class="text-[11px]">
                <span class="text-[10px] uppercase tracking-wider text-slate-500">【macro_stance】</span>
                <span class="ml-1 font-mono" x-text="layer.macro_stance || '—'"></span>
                <span x-show="layer.completeness_warning"
                      class="ml-3 text-amber-600 dark:text-amber-400"
                      x-text="layer.completeness_warning"></span>
              </div>
            </template>

            <!-- 综合结论 + 给下游的建议 + 人话解读 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-[11.5px]">
              <div>
                <span class="text-[10px] uppercase tracking-wider text-slate-500">【综合结论】</span>
                <span class="ml-1 font-mono" x-text="layer.verdict || '—'"></span>
              </div>
              <div>
                <span class="text-[10px] uppercase tracking-wider text-slate-500">【给下游的建议】</span>
                <span class="ml-1" x-text="layer.downstream_hint || '—'"></span>
              </div>
            </div>
            <div class="text-[12px] text-slate-700 dark:text-slate-300 leading-snug
                        border-l-2 border-blue-400 dark:border-cyan-500 pl-2">
              <span class="text-[10px] uppercase tracking-wider text-slate-500 mr-1">【人话解读】</span>
              <span x-text="layer.plain_reading || '—'"></span>
            </div>
          </li>
        </template>
      </ul>
    </section>

    <!-- ============================================================ -->
    <!-- 🔢 区域 3:组合因子(6 个,讲述式)                           -->
    <!-- ============================================================ -->
    <section id="region-3" class="audit-card">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>🔢</span><span>组合因子 · 6 个</span>
        </h2>
        <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5">
          多个原始因子按规则合成的高阶信号。每个卡展示"由哪些因子组合 / 组合规则 / 当前值解读 / 影响哪一层"。
        </p>
      </header>
      <div class="p-3 grid grid-cols-1 md:grid-cols-2 gap-3">
        <template x-for="c in compositeCards()" :key="c.card_id">
          <article class="border border-slate-200 dark:border-slate-800 rounded-md p-3 space-y-2">
            <header class="flex items-center justify-between">
              <h4 class="text-[13px] font-semibold" x-text="c.name"></h4>
              <div class="flex items-center gap-2">
                <span class="text-sm font-mono font-bold tabular-nums"
                      :class="directionClass(c.impact_direction)"
                      x-text="formatFactorValue(c.current_value)"></span>
                <span class="text-[9px] px-1 rounded bg-slate-100 dark:bg-slate-800
                             text-slate-600 dark:text-slate-400"
                      x-text="c.linked_layer"></span>
              </div>
            </header>

            <!-- 组成 -->
            <div>
              <div class="stat-label mb-1">由哪些因子组合(权重 / 作用)</div>
              <ul class="space-y-0.5 text-[11px]">
                <template x-for="comp in (compositeComposition(c.card_id) || [])" :key="comp.factor_id">
                  <li class="flex items-start gap-1.5 leading-tight">
                    <span class="text-slate-400 shrink-0">•</span>
                    <span class="flex-1" x-text="comp.name"></span>
                    <span class="font-mono tabular-nums text-slate-600 dark:text-slate-400"
                          x-text="formatFactorValue(comp.value) + (comp.weight ? ' / w=' + comp.weight : '')"></span>
                  </li>
                </template>
                <li x-show="(compositeComposition(c.card_id) || []).length === 0"
                    class="text-[11px] text-slate-400">组成明细未就绪</li>
              </ul>
            </div>

            <!-- 规则 / 当前值解读 / 影响哪一层 -->
            <div class="text-[11px] space-y-0.5 leading-snug">
              <div>
                <span class="text-[9.5px] uppercase tracking-wider text-slate-500">规则</span>
                <span class="ml-1" x-text="compositeRule(c.card_id) || '—'"></span>
              </div>
              <div>
                <span class="text-[9.5px] uppercase tracking-wider text-slate-500">当前值说明</span>
                <span class="ml-1" x-text="compositeInterpretation(c.card_id) || c.plain_interpretation || '—'"></span>
              </div>
              <div>
                <span class="text-[9.5px] uppercase tracking-wider text-slate-500">影响</span>
                <span class="ml-1" x-text="compositeAffects(c.card_id) || c.strategy_impact || '—'"></span>
              </div>
            </div>
          </article>
        </template>
        <div x-show="compositeCards().length === 0"
             class="col-span-full text-[11px] text-slate-500 py-4 text-center">
          暂无组合因子(冷启动期或 pipeline 失败)
        </div>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 📂 区域 4:原始因子(5 组,主要平铺 + 次要折叠)              -->
    <!-- ============================================================ -->
    <section id="region-4" class="audit-card">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>📂</span><span>原始数据因子</span>
          <span class="text-[11px] font-normal text-slate-500 ml-2"
                x-text="'共 ' + (state.factor_cards || []).filter(c => c.tier !== 'composite').length + ' 个'"></span>
        </h2>
        <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5">
          系统从这些底层因子出发,逐层合成组合因子,再进入五层证据判断。每组内主要因子平铺展示,其他折叠。
        </p>
      </header>
      <div class="divide-y divide-slate-100 dark:divide-slate-800">
        <template x-for="group in factorGroups()" :key="group.key">
          <section class="p-4 space-y-2">
            <header class="flex items-center justify-between">
              <h3 class="text-[13px] font-semibold flex items-center gap-2">
                <span x-text="group.icon"></span>
                <span x-text="group.label"></span>
                <span class="text-[10px] font-normal text-slate-500"
                      x-text="'主要 ' + group.primary.length + ' / 次要 ' + group.secondary.length + ' · 左绿边=主要'"></span>
              </h3>
              <span class="text-[10px] text-slate-500" x-text="group.source"></span>
            </header>

            <!-- 统一 2 列等宽网格:主要因子在前(左绿边),次要因子在后(无边)。
                 所有卡等宽,grid 自动对齐高度,不再有左右栏长短不一的留白。-->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
              <template x-for="c in group.allOrdered" :key="c.card_id">
                <article class="border border-slate-200 dark:border-slate-800 rounded p-2 space-y-1"
                         :class="c.is_primary ? 'border-l-2 border-l-emerald-500 dark:border-l-emerald-400' : ''"
                         :id="'card-' + c.card_id">
                  <header class="flex items-center gap-1.5">
                    <h4 class="text-[12px] font-medium flex-1 truncate"
                        x-text="c.name"></h4>
                    <span class="text-[13px] font-mono font-semibold tabular-nums"
                          :class="directionClass(c.impact_direction)"
                          x-text="formatFactorValue(c.current_value)
                                  + (c.value_unit ? (' ' + c.value_unit) : '')"></span>
                    <span class="inline-block w-1.5 h-1.5 rounded-full"
                          :class="freshnessColor(c.data_fresh ? 'green' : 'red')"
                          :title="c.captured_at_bjt || '无时间戳'"></span>
                  </header>
                  <p class="text-[11px] text-slate-600 dark:text-slate-400 leading-snug"
                     x-text="c.plain_interpretation"></p>
                  <div class="flex items-center justify-between text-[10px] leading-tight">
                    <span :class="directionClass(c.impact_direction)"
                          x-text="'影响:' + directionLabel(c.impact_direction)
                                  + ' · ' + c.linked_layer"></span>
                    <span class="font-mono tabular-nums text-slate-500"
                          x-text="c.captured_at_bjt || '—'"></span>
                  </div>
                </article>
              </template>
              <!-- 奇数卡时右下补一个"空格 spacer"占位,视觉上表明"这组就这么多",
                   不是加载失败。只在主流 PC 视角下出现,sm: 断点才起作用。 -->
              <div x-show="group.allOrdered.length % 2 === 1"
                   class="hidden sm:block border border-dashed border-slate-200 dark:border-slate-800
                          rounded p-2 text-[10px] text-slate-400 flex items-center justify-center"
                   x-text="'本组共 ' + group.allOrdered.length + ' 个因子'"></div>
            </div>
          </section>
        </template>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 📅 区域 5:历史与复盘                                         -->
    <!-- ============================================================ -->
    <section id="region-5" class="audit-card">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>📅</span><span>历史与复盘</span>
        </h2>
      </header>
      <!-- Sprint 2.3 R2:原 2/3 timeline + 1/3 复盘入口 → 时间线全宽 + 复盘入口作为一行薄条。
           避免"左长时间线 / 右两个短链接"的高度差留白。-->
      <div class="p-4 space-y-3">
        <!-- 复盘入口(一行全宽薄条)-->
        <div class="flex items-center justify-between flex-wrap gap-2 text-[11.5px]
                    border border-slate-200 dark:border-slate-800 rounded px-3 py-2">
          <span class="stat-label m-0">复盘入口</span>
          <div class="flex items-center gap-3">
            <a class="underline decoration-dotted text-slate-500 cursor-not-allowed">
              查看最新 weekly 复盘(v0.6)
            </a>
            <a class="underline decoration-dotted text-slate-500 cursor-not-allowed">
              已完成 lifecycle 复盘列表
            </a>
            <span class="text-[10px] text-slate-400">Sprint 2.4 接 /api/review/{lifecycle_id}</span>
          </div>
        </div>

        <!-- 最近运行时间线(全宽)-->
        <div>
          <h3 class="subheading mb-2">最近运行时间线</h3>
          <template x-if="historyTimeline().length > 0">
            <ol class="relative border-l-2 border-slate-200 dark:border-slate-800 pl-3 space-y-2">
              <template x-for="node in historyTimeline()" :key="node.ts_bjt">
                <li class="relative">
                  <span class="absolute -left-[15px] top-1.5 w-2 h-2 rounded-full"
                        :class="timelineNodeColor(node.type)"></span>
                  <div class="flex items-center gap-2 text-[10px] font-mono">
                    <span class="text-slate-500" x-text="node.ts_bjt"></span>
                    <span class="px-1 py-0 rounded text-[9px]"
                          :class="timelineNodeBadgeClass(node.type)"
                          x-text="timelineNodeTypeLabel(node.type)"></span>
                  </div>
                  <div class="text-[11.5px] mt-0.5" x-text="node.label"></div>
                </li>
              </template>
            </ol>
          </template>
          <div x-show="historyTimeline().length === 0"
               class="text-[11px] text-slate-500">
            暂无历史节点(Sprint 2.4 会接入完整 /api/strategy/history)。
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="pt-2 pb-4 text-[10px] text-slate-500 dark:text-slate-500 flex flex-wrap gap-3">
      <span>Data: CoinGlass / Glassnode / Yahoo Finance / FRED</span>
      <span>Rules <span x-text="state.meta && state.meta.rules_version"></span></span>
      <span>Model <span x-text="state.meta && state.meta.ai_model_actual"></span></span>
      <span>Source <span class="font-mono" x-text="dataSource"></span></span>
      <span class="ml-auto">策略审计层 • 非自动交易 • 决策由你</span>
    </footer>
  </main>
  </template>
</body>
</html>
