# ============================================================
# thresholds.yaml — 所有阈值 / 门槛 / 乘数 / 评分权重
# ============================================================
# 用途:所有"可调阈值"的**单一真相来源**。代码只读取,不硬编码。
#       校准纪律(§10.6):每次调参记录调前/调后/理由/样本,并 bump
#       base.yaml → project.rules_version。
#
# 布局:顺着建模文档的层级(L1→L2→L3→L4→L5)+ 观察分类 + KPI
#       + 6 个组合因子的评分权重。每块都在注释里写清楚对应章节。
#
# 创建于:2026-04-23(Sprint 1 前置工作 · 优化二第 2 批)
# 建模版本:v1.2
# ============================================================


# ============================================================
# 0. 全局 permission 纪律(Sprint 1.11 统一,跨层权威)
# ============================================================
# 跨层共享的 execution_permission 严格度顺序(wide → strict,
# 索引越大越严)。L3 / L4 / state_machine 归并 permission 时,
# 取索引更大者(更严者胜)。
#
# 记忆要点:
#   protective > watch:protective 是"已需主动减仓"状态,最严
#   watch > hold_only:watch = 完全不动;hold_only = 保持现有持仓,
#                      但禁止新开仓
#   hold_only > no_chase:hold_only 禁任何 open;no_chase 禁主动追入
#                          但允许反向等待
#   no_chase > ambush_only:ambush 可在特定条件(回踩等)开仓;
#                            no_chase 完全不追
#   cautious_open > ambush_only:cautious_open 允许主动开(谨慎档位);
#                                  ambush_only 只等价格到特定区才开
#   can_open > cautious_open:can_open 最宽,无额外约束
permission_strictness_order:
  - can_open
  - cautious_open
  - ambush_only
  - no_chase
  - hold_only
  - watch
  - protective


# ============================================================
# 1. Layer-1 市场状态(§4.2.5)
# ============================================================
layer_1_regime:
  adx:
    # ADX ≥ strong_threshold → 强趋势;震荡误判多上调至 28
    strong_threshold: 25
    # ADX ≥ weak_threshold(但 < strong)→ 弱趋势;漏早期趋势下调至 18
    weak_threshold: 20

  atr_percentile:
    # 按过去 180 天分位分级(compact / normal / elevated / extreme)
    low: 30          # < low → compact(平静)
    elevated: 60     # [low, elevated) → normal;[elevated, extreme) → elevated
    extreme: 85      # ≥ extreme → extreme 波动(L4 position_cap × 0.5)

  # regime 切换最少连续次数 —— 防止单点噪音翻牌
  regime_switch_min_consecutive: 3

  # Swing 识别左右窗口(swing_highs_lows_1d)
  swing_window: 5

  # ATR 回溯窗口(用于分位计算)
  atr_lookback_days: 180


# ============================================================
# 2. Layer-2 方向与结构(§4.3)
# ============================================================
layer_2_direction:

  # Sprint Layer-B Cleanup 删除:
  #   - dynamic_direction_thresholds(9 档 cycle_position 动态门槛,
  #     CyclePositionFactor 已整删)
  #   - cycle_position_switch_delay_days(9 档切换延迟)
  # L2 stance 门槛改用 evidence/pillars.py:_l2_downstream_hint 内的
  # 统一阈值(做多 0.65 / 做空 0.70),不再因 cycle_position 调整。
  # stance_confidence_floor / ceiling 同期归档(0 consumer),整体由
  # 未来 layer_2_direction 配置块退役 sprint 清理。


# ============================================================
# 3. Layer-3 机会与执行(§4.4)
# ============================================================
# L3 是**纯规则判档层**(§4.4.2)。下面的判档条件必须以
# 查找表形式实现,禁止在代码里写 score += X 的加权(M16)。
layer_3_opportunity:

  # ---- 做多判档规则(§4.4.4)----
  # 每条规则是一组 AND 条件;第一个匹配的 grade 即为输出。
  # 条件语法:{字段名: 允许值集合};位置字段是 L2 key_levels.current_position。
  long_grade_rules:
    - grade: A
      conditions:
        regime: [trend_up, transition_up]
        stance: [bullish]
        stance_confidence_at_or_above_dynamic_threshold: true
        phase: [early, mid]
        position: [near_support, mid_range]
    - grade: B
      conditions:
        regime: [trend_up, transition_up]
        stance: [bullish]
        stance_confidence_at_or_above_dynamic_threshold: true
        phase: [early, mid, late]
        # "位置 ≠ above_all_key_levels"
        position_not_in: [above_all_key_levels]
    - grade: C
      conditions:
        regime: [trend_up, transition_up]
        stance: [bullish]
        stance_confidence_at_or_above_dynamic_threshold: true
        phase: [late]
        position: [near_resistance]
    # 未匹配任一规则 → none(由判档函数默认返回)

  # ---- 做空判档规则(§4.4.5,v1.2 简化为 A / B / none)----
  short_grade_rules:
    - grade: A
      conditions:
        # Sprint Layer-B Cleanup:cycle_position 9 档判定已退役,Layer A 6 阶段替代
        stance: [bearish]
        stance_confidence_at_or_above_dynamic_threshold: true
        regime: [trend_down, transition_down, range_high]
        position: [near_resistance, above_all_key_levels]
        crowding_score_at_or_above: 6
        truth_trend_score_at_or_above: 6
        truth_trend_direction: down
    - grade: B
      conditions:
        # Sprint Layer-B Cleanup:cycle_position 9 档判定已退役,Layer A 6 阶段替代
        stance: [bearish]
        stance_confidence_at_or_above_dynamic_threshold: true
        regime: [trend_down, transition_down, range_high]
        position: [near_resistance, above_all_key_levels]
        crowding_score_at_or_above: 6
        truth_trend_score_range: [4, 5]
        truth_trend_direction: down
    # 其他情况 → none。v1 不允许 C 级(M3 + B3)

  # ---- Grade 硬门槛(Sprint 1.9 新增)----
  # 结构化的 A/B/C 门槛,供 Layer3Opportunity._compute_specific 使用。
  # 与上面的 long_grade_rules / short_grade_rules 并存:老版规则是原始表达
  # (文档一致性),新版 grade_*_floors 是代码实际读取的执行参数。
  grade_a_floors:
    stance_confidence:             0.70
    cycle_confidence:              0.85
    truth_trend_allowed_bands:     ["true_trend"]
    band_position_allowed_phases:  ["early", "mid"]    # bullish & bearish 皆然
    crowding_disallowed_bands:     ["extreme"]
    regime_allowed:                ["trend_up", "trend_down"]
    event_risk_disallowed_bands:   ["high"]
    macro_disallowed_bands_bullish: ["strong_headwind"]
  grade_b_floors:
    stance_confidence:             0.62
    cycle_confidence:              0.60
    truth_trend_allowed_bands:     ["true_trend", "weak_trend"]
    band_position_disallowed_phases_bullish: ["exhausted"]  # 不能顶
    band_position_disallowed_phases_bearish: ["exhausted"]  # 不能底
    crowding_disallowed_bands:     []         # elevated/mild 可 B,仅 flag
    regime_allowed:                ["trend_up", "trend_down",
                                    "transition_up", "transition_down",
                                    "range_high", "range_low", "range_mid"]
    event_risk_disallowed_bands:   []         # high 可 B,但会降 execution
  grade_c_floors:
    stance_confidence:             0.55

  # ---- 反模式参数(Sprint 1.9,§7.9)----
  # 每个 anti_pattern 的触发参数;impact 固定在代码里(不同类型的处罚不同)。
  anti_patterns:
    chasing_high:
      recent_bars: 3
      rally_threshold_pct: 0.08     # 近 3 根日线涨幅 > 8%
    catching_falling_knife:
      recent_bars: 5
      move_threshold_pct: 0.10      # 近 5 根日线逆势 > 10%
    overtrading_crowding:
      crowding_triggers: ["extreme"]
    event_window_trading:
      hours_window: 24
      high_event_types: ["fomc", "cpi", "nfp", "options_expiry_major"]
    macro_misalignment:
      bullish_against_bands: ["strong_headwind"]
      # bearish 侧 v1 不设(见 sprint_1_9.md Trigger)

  # ---- 入场确认(§4.4.7)----
  entry_confirmation_timeframe: "1h"          # 1H 收盘确认成交
  hard_invalidation_confirmation_timeframe: "4h"  # 4H 收盘确认失效
  hard_invalidation_prewarning_deviation_pct: 0.01   # 1% 预警
  early_failure_protection_holding_hours: 24          # 持仓 < 24h 允许 1H 反向触发

  # ---- 仓位分层(§4.4.10)----
  position_layering_weights: [30, 40, 30]     # 3 档权重之和 = 100
  max_deepest_retracement_fib: 0.5            # entry_zone 最深档回撤(斐波那契)


# ============================================================
# 4. Layer-4 风险与失效(§4.5)
# ============================================================
layer_4_risk:

  # ---- position_cap 串行合成(§4.5.5,M19)----
  position_cap_composition:
    base_position_cap_pct: 70       # §4.5.8 v0.1 初始

    # 全局硬下限 15%(critical 可低于)
    hard_floor_pct: 15
    # 仅在以下 permission 下硬下限生效(§4.5.5 问题 4)
    hard_floor_applies_to_permissions:
      - can_open
      - cautious_open
      - ambush_only

    # step 2:L4 overall_risk_level 乘数
    risk_level_multipliers:
      low:      1.0
      moderate: 0.9
      elevated: 0.7
      high:     0.5
      critical: 0.3     # 此档时允许 final < hard_floor,甚至为 0

    # step 3:Crowding 乘数(score 0-8)
    crowding_multipliers:
      - { score_range: [0, 3], multiplier: 1.00 }
      - { score_range: [4, 5], multiplier: 0.85 }
      - { score_range: [6, 8], multiplier: 0.70 }

    # step 4:MacroHeadwind 乘数(score -10..+10)
    macro_headwind_multipliers:
      - { score_range: [-1, 10],  multiplier: 1.00 }
      - { score_range: [-4, -2],  multiplier: 0.85 }
      - { score_range: [-10, -5], multiplier: 0.70 }

    # step 5:EventRisk 乘数(score 0-15+)
    event_risk_multipliers:
      - { score_range: [0, 3],    multiplier: 1.00 }
      - { score_range: [4, 7],    multiplier: 0.85 }
      - { score_range: [8, 999],  multiplier: 0.70 }

    # L1 volatility_regime = extreme 时对 position_cap 的额外乘数
    # (§2.4 软否决条目)
    l1_extreme_volatility_multiplier: 0.5

  # ---- execution_permission 归并(§4.5.6,M20)----
  execution_permission_merging:
    # 各来源对 final_permission 的建议档;归并取最严(从严档 → 宽松档排序)
    # 注意:hold_only 不参与归并,是 HOLD 状态下的默认 permission,在
    # state_machine 里作为 on_enter 副作用设置,不走归并逻辑。
    # permission 枚举全集在 layers.yaml → layer_3_opportunity.
    # output_enums.execution_permission(7 值,含 hold_only);本处只是严格度排序。
    # no_chase 的位置:介于 ambush_only 和 cautious_open 之间,语义"不追但不禁"。
    severity_rank:
      - protective
      - watch
      - ambush_only
      - no_chase
      - cautious_open
      - can_open

    # L4 overall_risk_level 建议
    l4_risk_suggestions:
      critical: protective
      high:     watch
      elevated: ambush_only
      moderate: cautious_open
      low:      can_open

    # L4 Crowding 建议(score 触发的最严档)
    l4_crowding_suggestions:
      - { score_at_or_above: 6, suggests: cautious_open }
      - { score_at_or_above: 0, suggests: can_open }

    # L4 EventRisk 建议
    l4_event_risk_suggestions:
      - { score_at_or_above: 8, suggests: ambush_only }
      - { score_at_or_above: 4, suggests: cautious_open }
      - { score_at_or_above: 0, suggests: can_open }

    # L5 MacroHeadwind 建议
    l5_macro_headwind_suggestions:
      - { score_at_or_below: -5, suggests: ambush_only }
      - { score_at_or_below: -2, suggests: cautious_open }
      - { score_at_or_below: 10, suggests: can_open }

    # A 级缓冲(§4.5.6)
    a_grade_buffer:
      enabled: true
      # 需同时满足以下条件才启用 A 级缓冲
      conditions:
        opportunity_grade: [A]
        regime: [trend_up, trend_down]
        regime_stability: [stable, slightly_shifting]
      # 缓冲后的 final_permission 下限(不得严于此档)
      min_permission_floor: cautious_open
      # 例外(§4.5.6 问题 3):以下硬状态不受 A 级缓冲覆盖
      overrides:
        - state_in_protection            # PROTECTION 态
        - l5_extreme_event_detected      # 强制 PROTECTION
        - l4_overall_risk_critical       # 强制 protective
        - l1_regime_chaos                # 强制 watch

  # ============================================================
  # Sprint 1.10 新增:Per-trade 风险配置(与 position_cap_composition
  # 不冲突 —— 前者是账户级组合 cap,此处是单笔机会的 cap)。
  # ============================================================

  # Per-trade 基础 cap(按 grade 查表)
  grade_to_base_cap:
    A:    0.15      # 最大 15% 净值
    B:    0.10
    C:    0.05
    none: 0.0

  # 逐项衰减因子(乘法累乘)
  per_trade_decay:
    crowding:
      low:       1.00
      moderate:  1.00
      normal:    1.00    # composite 输出可能用 normal/mild/extreme
      mild:      0.90
      elevated:  0.85
      extreme:   0.60
    event_risk:
      low:       1.00
      moderate:  0.95
      medium:    0.95    # composite 可能用 medium
      high:      0.70
      extreme:   0.50
    volatility:
      low:       1.00
      normal:    1.00
      elevated:  0.80
      extreme:   0.60
    # stance_confidence 分档(按 min 阈值查表,首个命中)
    stance_confidence:
      - {min: 0.75, multiplier: 1.05}
      - {min: 0.65, multiplier: 1.00}
      - {min: 0.55, multiplier: 0.85}
      - {min: 0.00, multiplier: 0.60}
    anti_pattern_count:
      zero: 1.00
      one:  0.85
      two_or_more: 0.70
    cold_start_multiplier: 0.50

  # 最小 cap 保护:低于此值则强制 cap=0 + permission=watch
  position_cap_min: 0.015

  # ---- Stop loss ----
  stop_loss:
    # ATR 乘数(按波动 regime)
    atr_multipliers:
      low:      1.5
      normal:   2.0
      elevated: 2.5
      extreme:  3.0
    # swing 缓冲:swing_low × (1 - buffer)  或 swing_high × (1 + buffer)
    swing_buffer_pct: 0.015
    # swing 离现价 > 此阈值视为过远,失效
    swing_max_distance_pct: 0.10

  # ---- Risk-Reward ----
  risk_reward:
    full_threshold:    2.0   # RR ≥ 2.0 不扣 cap
    reduced_threshold: 1.5   # [1.5, 2.0) 扣 × 0.8 + permission 最多 cautious_open
    reduced_cap_multiplier: 0.8
    # 若没明确 target,用 ATR × 这个乘数做粗估
    fallback_target_atr_multiplier: 3.0

  # ---- 加仓分层计划(§7.10)----
  scale_in_plans:
    A:
      layers: 3
      allocations: [0.40, 0.30, 0.30]
      trigger_conditions:
        - "第 1 层:初始进场(突破前回调到 EMA20 位置)"
        - "第 2 层:突破确认后回踩(4H 收盘站稳)"
        - "第 3 层:第二轮回踩不破前低"
    B:
      layers: 2
      allocations: [0.50, 0.50]
      trigger_conditions:
        - "第 1 层:初始进场(建模 §4.4 入场信号)"
        - "第 2 层:第一轮盈利保护后的加仓(趋势延续)"
    C:
      layers: 1
      allocations: [1.00]
      trigger_conditions:
        - "观察仓(hold_only),不计划加仓"
    none:
      layers: 0
      allocations: []
      trigger_conditions: []

  # ---- Permission 严格度 ----
  # Sprint 1.11 统一到顶层 `permission_strictness_order`。
  # L4 通过 src/utils/permission.py 的 merge_permissions() 调用。
  # 老的 execution_permission_merging.severity_rank 保留作文档,不被代码读取。

  # ---- 拥挤度相关衍生品阈值(§4.5.8)----
  crowding_thresholds:
    funding_rate_extreme_pct: 0.0003        # 0.03%
    funding_rate_extreme_consecutive: 3      # 连续 3 次(24h 跨度)
    funding_rate_30d_percentile_alert: 85
    oi_change_24h_alert_pct: 0.15            # 15%
    long_short_ratio_alert: 2.5
    # Sprint 1.8.1 删除:basis_annualized_alert + put_call_ratio_low
    # (因子退役 — 详见 docs/cc_reports/sprint_1_8_1_full.md)

  # ---- 事件窗口激活 ----
  event_window_activation_hours: 48          # §4.5.8

  # ---- Risk tag 枚举(§4.5.9)----
  # 程序侧检查 active_risk_tags 时用这份清单做值校验
  risk_tag_enum:
    - funding_extreme
    - oi_spike
    - crowded_long
    - crowded_short
    - liquidity_thin
    - correlation_break
    - leverage_stretched
    - volatility_regime_shift
    - structural_divergence


# ============================================================
# 5. Layer-5 宏观与事件(§4.6.5)
# ============================================================
layer_5_macro:
  dxy_20d_change_threshold_pct: 0.02       # ±2% 触发宏观逆风评分
  us10y_30d_change_bp_threshold: 30        # ±30bp 触发
  vix_elevated: 25
  vix_extreme: 35
  btc_nasdaq_correlation_strong: 0.7       # 相关性加权阈值
  extreme_event_btc_daily_pct: 0.15        # BTC 单日 ±15% 视为极端事件
  ai_summary_confidence_downgrade: 0.6     # AI 置信度 < 此值 → 影响力自动降级


# ============================================================
# 6. Observation Category(§4.7.3 + §4.7.5)
# ============================================================
# 只读产物,不得进入决策(M28)。
observation_category:
  # possibly_suppressed 状态需连续成立的最少天数
  suppressed_continuous_days: 7
  # 连续 ≥ N 天 → warning 告警
  suppressed_warning_days: 14
  # 连续 ≥ N 天 → critical 告警
  suppressed_critical_days: 30
  # 冷启动(base.yaml → cold_start.warming_up_days)期间允许输出
  # cold_start_warming_up 第四标签;实际开关见 base.yaml


# ============================================================
# 7. KPI 追踪(§8.8,M27)
# ============================================================
kpi_tracker:
  # KPI-1 主升浪捕捉率
  uptrend_capture:
    identification_price_up_pct: 0.40    # > 40% 涨幅
    identification_duration_days: 60     # 且持续 > 60 天
    window_review_months: 6              # 每 6 个月回看
    # 未达标处理:推送 kpi_unmet + 人工审视 L3 判档

  # KPI-2 主跌浪反应率
  downtrend_response:
    identification_drawdown_from_ath_pct: 0.30  # 从 ATH 跌 > 30%
    identification_duration_days: 45
    # 未达标 → 人工审视 L2 方向识别

  # KPI-3 持续观望时长
  prolonged_watch:
    critical_runs: 180         # 连续 FLAT ≥ 180 次(约 30 天)→ critical
    forced_human_runs: 420     # ≥ 420 次(约 70 天)→ 必须停机人工介入

  # 冷启动期间 KPI 不累计(§8.10,实际开关在 base.yaml)


# ============================================================
# 8. 组合因子评分权重
# ============================================================
# 所有组合因子的评分规则、权重、分档边界都集中在这里;对应
# config/data_catalog.yaml → composite_factors.*.formula_ref 的实现读取。

# Sprint 1.8.1 删除:8.1 truth_trend_scoring + 8.2 band_position_scoring
# (composite/truth_trend.py + composite/band_position.py 已退役;v1.3 改用
# 6 AI 角色综合判断 + AdjudicatorValidator)


# Sprint Layer-B Cleanup 删除:
#   8.3 cycle_position_decision(composite/cycle_position.py 整删,Layer A
#       6 阶段 bear_bottom/recovery/bull_main/bull_late/top_distribution/
#       bear_decline 替代 9 档判断)
# 已与之前 1.8.1 退役的:
#   8.1 truth_trend_scoring / 8.2 band_position_scoring(composite/truth_trend.py
#       + composite/band_position.py 退役)
#   8.4 crowding_scoring / 8.5 macro_headwind_scoring / 8.6 event_risk_scoring
#       (对应 composite/*.py 都退役;v1.3 改用 6 AI 角色综合判断)
# 一并归档。生产端不消费任何 composite 阈值表。
