# ============================================================
# state_machine.yaml — Sprint 1.5a 14 档状态机(对齐建模 §5)
# ============================================================
#
# 权威蓝本:docs/modeling.md §5.1-§5.6。任何改动必须对齐 modeling.md。
#
# 与 Sprint 1.13-1.14 的旧 state_machine.yaml / lifecycle_fsm.yaml 完全不同:
#   * 旧版是"系统运行状态分类器",6 个 CC 自造标签(active_long_execution 等)
#   * 旧版 lifecycle_fsm.yaml 是 adjudicator.action 驱动的 FSM
#   * 新版是建模 §5 的"交易生命周期 14 档状态机":
#       FLAT / LONG_{PLANNED,OPEN,HOLD,TRIM,EXIT} /
#       SHORT_{PLANNED,OPEN,HOLD,TRIM,EXIT} /
#       FLIP_WATCH / PROTECTION / POST_PROTECTION_REASSESS
#
# 迁移逻辑在 src/strategy/state_machine.py 内用 Python 实现。
# 本 YAML 只存"可配置参数":阈值、乘数、冷却硬界限等。
#
# Sprint 1.5a 创建于:2026-04-24
# ============================================================

version: "1.5a"

# ---------- L2 stance_confidence 动态门槛(§4.3.6)----------
# 当前用静态默认值;未来可接入 Observation Category 做动态调整(§1.8)
stance_confidence_thresholds:
  long_min: 0.60
  short_min: 0.65

# ---------- FLIP_WATCH 冷却配置(§5.3)----------
flip_watch:
  base_min_hours: 18
  base_max_hours: 96
  hard_floor_min_hours: 8       # effective_min 下限
  hard_ceil_max_hours: 168      # effective_max 上限
  # 动态乘数(v1.2 删除 previous outcome_type 影响)
  cycle_position_multipliers:
    late_bull: 0.7
    distribution: 0.7
    late_bear: 0.7
    accumulation: 0.7
    mid_bull: 1.3
    mid_bear: 1.3
  volatility_multipliers:
    extreme: 1.3
    low: 0.8

# ---------- LONG_OPEN / SHORT_OPEN 早期保护阈值 ----------
open_phase:
  min_hours_to_hold: 24          # §5.2 LONG_OPEN → LONG_HOLD 时间条件
  pnl_confirmed_threshold_pct: 2.0  # +2% 浮盈
  tp1_distance_pct: 50.0         # take_profit 第一档 50% 距离
  stance_flip_window_hours: 12   # 开仓后 12h 内 stance 翻转窗口
  stance_flip_confidence_min: 0.7  # 翻转所需 confidence

# ---------- POST_PROTECTION_REASSESS 强制持续(§5.2)----------
post_protection_reassess:
  min_hold_hours: 4              # 强制持续至少一个 4H 周期

# ---------- AI Phase 判定 LONG_HOLD → LONG_TRIM 的置信度下限(§5.2)----------
trim_triggers:
  phase_late_confidence_min: 0.65
