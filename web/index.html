<!DOCTYPE html>
<html lang="zh-CN" x-data="app()" x-init="init()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC 策略审计台</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Inter"', '"PingFang SC"', '"Microsoft YaHei"',
                   'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"SF Mono"', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>
  <script src="/assets/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>

<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100
             font-sans antialiased transition-colors min-h-screen">

  <!-- Sticky Top Nav -->
  <header class="sticky top-0 z-30 border-b border-slate-200 dark:border-slate-800
                 bg-white/95 dark:bg-slate-950/95 backdrop-blur">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 h-10 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-600 dark:bg-cyan-400"></span>
        <span class="text-[13px] font-semibold tracking-tight">BTC Strategy</span>
        <span class="hidden sm:inline text-[11px] text-slate-500 dark:text-slate-400">策略审计台</span>
      </div>
      <div class="flex items-center gap-3 text-[11px]">
        <span class="hidden sm:inline font-mono text-emerald-600 dark:text-emerald-400"
              x-text="dataSource"></span>
        <span class="font-mono tabular-nums text-slate-600 dark:text-slate-400"
              x-text="nowBjt"></span>
        <button @click="toggleDark()"
                class="w-7 h-7 rounded flex items-center justify-center
                       hover:bg-slate-100 dark:hover:bg-slate-800 transition"
                title="切换主题">
          <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
          <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-3 lg:px-4 py-4 space-y-4">

    <!-- BTC 价格条 -->
    <section class="audit-card px-4 py-2.5 flex items-baseline gap-3">
      <span class="text-[11px] text-slate-500 dark:text-slate-400">BTC</span>
      <span class="text-2xl font-mono font-semibold tabular-nums" x-text="btcPrice"></span>
      <span class="text-[12px] tabular-nums"
            :class="(btc24hChangePct || 0) >= 0
                    ? 'text-emerald-600 dark:text-emerald-400'
                    : 'text-rose-600 dark:text-rose-400'"
            x-text="btc24hChangeText"></span>
      <span class="ml-auto text-[10px] text-slate-400 font-mono" x-text="btcSource"></span>
    </section>

    <!-- 老版本数据红字提醒(v12 fallback)-->
    <section x-show="schemaVersion === 'v12'"
             class="audit-card px-4 py-2.5 border-rose-300 bg-rose-50 dark:bg-rose-950/40
                    text-rose-700 dark:text-rose-300 text-[12px]">
      ⚠️ 当前显示的是老版本(v1.2)数据,部分字段不可用。1.10 完成后旧数据会被替换。
    </section>

    <!-- ============================================================ -->
    <!-- 🩺 系统自检面板:5 层 health + 数据源新鲜度(永远展开,无 toggle)-->
    <!-- ============================================================ -->
    <section class="audit-card px-4 py-2.5">
      <div class="flex items-center gap-2 text-[12px] mb-2">
        <span class="text-[12px] font-semibold">🩺 系统自检</span>
        <span class="text-[10.5px] text-slate-500 dark:text-slate-400"
              x-text="systemHealth?.overall_status || '—'"></span>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-[11.5px]">
        <!-- 5 层证据健康 -->
        <ul class="space-y-1">
          <template x-for="layer in (systemHealth?.evidence_layers || [])"
                    :key="layer.layer_id">
            <li class="flex items-center gap-2 leading-snug">
              <span class="font-mono w-3 inline-block"
                    x-text="layerHealthGlyph(layer.health)"></span>
              <span class="font-mono text-slate-500 dark:text-slate-400"
                    x-text="'L' + layer.layer_id"></span>
              <span class="text-slate-700 dark:text-slate-300"
                    x-text="layer.name"></span>
              <span class="ml-auto text-[10px] text-slate-400 font-mono"
                    x-text="layer.health"></span>
            </li>
          </template>
        </ul>
        <!-- 数据源新鲜度 -->
        <ul class="space-y-1">
          <template x-for="src in (systemHealth?.data_sources || [])"
                    :key="src.source_id">
            <li class="flex items-center gap-2 leading-snug">
              <span class="font-mono w-3 inline-block"
                    x-text="sourceStatusGlyph(src.status)"></span>
              <span class="text-slate-700 dark:text-slate-300"
                    x-text="src.name"></span>
              <span class="ml-auto text-[10px] text-slate-400 font-mono"
                    x-text="src.status"></span>
            </li>
          </template>
        </ul>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 决策摘要(summary_card)                                     -->
    <!-- ============================================================ -->
    <section class="audit-card px-5 py-4">
      <div class="flex items-baseline justify-between mb-2">
        <span class="text-[11px] uppercase tracking-wider text-slate-500 dark:text-slate-400">
          当前决策
        </span>
        <span class="text-[11px] font-mono text-slate-500 dark:text-slate-400"
              x-text="decisionTime"></span>
      </div>

      <h2 class="text-2xl lg:text-3xl font-semibold mb-3 leading-tight"
          x-text="headline"></h2>

      <div class="flex flex-wrap items-center gap-x-5 gap-y-1.5 text-[13px]">
        <span>状态:<strong x-text="actionStateLabel"></strong></span>
        <span>方向:<strong x-text="stanceLabel"></strong></span>
        <span x-show="validatorPassed === true"
              class="text-emerald-600 dark:text-emerald-400">✅ 验证通过</span>
        <span x-show="validatorPassed === false"
              class="text-amber-600 dark:text-amber-400">⚠️ 验证未通过(已自动覆盖)</span>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 警告条:反模式 + 极端事件(只在非空时显示)                  -->
    <!-- ============================================================ -->
    <section x-show="(antiPatternsActive || []).length > 0
                  || (extremeEventsActive || []).length > 0"
             class="audit-card px-5 py-3 border-amber-300 bg-amber-50 dark:bg-amber-950/30">
      <div class="text-[11px] font-semibold uppercase tracking-wider text-amber-700 dark:text-amber-300 mb-1.5">
        ⚠️ 风险提示
      </div>
      <ul class="space-y-1 text-[13px]">
        <template x-for="msg in (extremeEventsActive || [])" :key="'ev_' + msg">
          <li class="text-rose-700 dark:text-rose-300" x-text="msg"></li>
        </template>
        <template x-for="msg in (antiPatternsActive || [])" :key="'ap_' + msg">
          <li class="text-amber-700 dark:text-amber-300" x-text="msg"></li>
        </template>
      </ul>
    </section>

    <!-- ============================================================ -->
    <!-- 6 张层卡片(layer_cards)— 卡片密度 C:默认折叠            -->
    <!-- ============================================================ -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-3">
      <template x-for="(card, idx) in (layerCards || [])" :key="card.layer">
        <article class="audit-card px-4 py-3.5 flex flex-col gap-2">

          <!-- 标题 + 可信度 -->
          <header class="flex items-baseline justify-between">
            <span class="text-[10.5px] uppercase tracking-wider text-slate-500 dark:text-slate-400"
                  x-text="card.title"></span>
            <span class="text-[10.5px] text-slate-400 font-mono"
                  x-text="card.confidence != null ? '可信度 ' + (card.confidence * 100).toFixed(0) + '%' : ''"></span>
          </header>

          <!-- 主标签 -->
          <h3 class="text-[17px] font-semibold leading-snug"
              x-text="card.label"></h3>

          <!-- 次要标签 -->
          <div class="flex flex-wrap gap-1.5"
               x-show="(card.secondary_labels || []).filter(s => s).length > 0">
            <template x-for="sec in (card.secondary_labels || []).filter(s => s)" :key="sec">
              <span class="text-[11px] px-1.5 py-0.5 rounded
                           bg-slate-100 dark:bg-slate-800
                           text-slate-600 dark:text-slate-300"
                    x-text="sec"></span>
            </template>
          </div>

          <!-- 摘要(默认显示) -->
          <p class="text-[13px] leading-relaxed text-slate-700 dark:text-slate-300"
             x-show="card.summary"
             x-text="card.summary"></p>
          <p x-show="!card.summary"
             class="text-[12px] italic text-slate-400 dark:text-slate-500">
            (暂无摘要)
          </p>

          <!-- 展开按钮 -->
          <button @click="toggleCard(idx)"
                  class="self-start text-[11.5px] text-blue-600 dark:text-cyan-400 hover:underline mt-1">
            <span x-show="!cardOpen[idx]">查看详细 ▼</span>
            <span x-show="cardOpen[idx]">收起 ▲</span>
          </button>

          <!-- 详细展开区 -->
          <div x-show="cardOpen[idx]" x-transition
               class="border-t border-slate-200 dark:border-slate-800 pt-3 mt-1
                      space-y-3 text-[12.5px] leading-relaxed">

            <!-- 关键观察 -->
            <div x-show="(card.key_observations || []).length > 0">
              <div class="text-[11px] uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1">
                关键观察
              </div>
              <ul class="space-y-1 list-disc list-inside text-slate-700 dark:text-slate-300">
                <template x-for="obs in (card.key_observations || [])" :key="obs">
                  <li x-text="obs"></li>
                </template>
              </ul>
            </div>

            <!-- 完整分析 narrative -->
            <div x-show="card.narrative">
              <div class="text-[11px] uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1">
                完整分析
              </div>
              <p class="text-slate-700 dark:text-slate-300 whitespace-pre-line"
                 x-text="card.narrative"></p>
            </div>

            <!-- 矛盾信号 -->
            <div x-show="(card.contradicting_signals || []).length > 0">
              <div class="text-[11px] uppercase tracking-wider text-amber-600 dark:text-amber-400 mb-1">
                矛盾信号
              </div>
              <ul class="space-y-1 list-disc list-inside text-amber-700 dark:text-amber-300">
                <template x-for="sig in (card.contradicting_signals || [])" :key="JSON.stringify(sig)">
                  <li x-text="typeof sig === 'string' ? sig : (sig.text || JSON.stringify(sig))"></li>
                </template>
              </ul>
            </div>

            <!-- 支持数据 -->
            <div x-show="card.supporting_data && Object.keys(card.supporting_data || {}).length > 0">
              <div class="text-[11px] uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1">
                支持数据
              </div>
              <table class="text-[12px] w-full">
                <tbody>
                  <template x-for="[k, v] in Object.entries(card.supporting_data || {})" :key="k">
                    <tr class="border-b border-slate-100 dark:border-slate-800">
                      <td class="py-1 pr-3 align-top font-mono text-slate-500 dark:text-slate-400 whitespace-nowrap"
                          x-text="k"></td>
                      <td class="py-1 align-top">
                        <span class="font-mono text-slate-700 dark:text-slate-300"
                              x-text="formatValue(v.value)"></span>
                        <span x-show="v.explanation"
                              class="block text-[11px] text-slate-500 dark:text-slate-400 mt-0.5"
                              x-text="v.explanation"></span>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <div x-show="!card.supporting_data || Object.keys(card.supporting_data || {}).length === 0"
                 class="text-[11px] italic text-slate-400 dark:text-slate-500">
              暂无支持数据
            </div>
          </div>
        </article>
      </template>
    </section>

    <!-- 空数据兜底 -->
    <section x-show="(layerCards || []).length === 0 && !loading"
             class="audit-card px-5 py-6 text-center text-slate-500 dark:text-slate-400 text-[12px]">
      暂无策略数据。等待下次 16:05 BJT cron 自动跑,或手动触发
      <code class="font-mono px-1">python scripts/run_pipeline_once.py</code>。
    </section>

    <section x-show="loading"
             class="audit-card px-5 py-6 text-center text-slate-500 dark:text-slate-400 text-[12px]">
      载入中…
    </section>

    <!-- Footer -->
    <footer class="text-[10px] text-slate-400 dark:text-slate-600 text-center py-3">
      Schema:<span x-text="schemaVersion || '-'" class="font-mono"></span>
      · run_id: <span x-text="(runId || '').slice(0, 12)" class="font-mono"></span>
    </footer>

  </main>

</body>
</html>
