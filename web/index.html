<!DOCTYPE html>
<html lang="zh-CN" x-data="app()" x-init="init()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC 策略审计台</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Inter"', '"PingFang SC"', '"Microsoft YaHei"',
                   'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"SF Mono"', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>
  <script src="/assets/app.js?v=layer-b-swing-dashboard-20260514"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>

<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100
             font-sans antialiased transition-colors min-h-screen">

  <!-- ============================================================ -->
  <!-- Sticky Top Nav                                               -->
  <!-- ============================================================ -->
  <header class="sticky top-0 z-30 border-b border-slate-200 dark:border-slate-800
                 bg-white/95 dark:bg-slate-950/95 backdrop-blur">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 h-10 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-600 dark:bg-cyan-400"></span>
        <span class="text-[13px] font-semibold tracking-tight">BTC Strategy</span>
        <span class="hidden sm:inline text-[11px] text-slate-500 dark:text-slate-400">策略审计台</span>
      </div>
      <div class="flex items-center gap-3 text-[11px]">
        <span class="hidden sm:inline font-mono"
              :class="dataSource === 'api' ? 'text-emerald-600 dark:text-emerald-400'
                                           : 'text-amber-600 dark:text-amber-400'"
              x-text="dataSourceLabel"></span>
        <span class="font-mono tabular-nums text-slate-600 dark:text-slate-400"
              x-text="nowBjt"></span>
        <button @click="toggleDark()"
                class="w-7 h-7 rounded flex items-center justify-center
                       hover:bg-slate-100 dark:hover:bg-slate-800 transition"
                :title="darkMode ? '切换到白天' : '切换到夜间'">
          <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ============================================================ -->
  <!-- 🚨 review_pending 红色全局横幅(Sprint 1.10-I §9.3 + D2=a)  -->
  <!-- 数据源:GET /api/system/health (HealthResponse.review_pending)-->
  <!-- ============================================================ -->
  <div x-show="reviewPending && reviewPending.active"
       class="bg-rose-600 dark:bg-rose-700 text-white border-b-2 border-rose-800
              shadow-lg z-20 sticky top-10">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 py-2.5 flex flex-wrap items-center
                justify-between gap-3 text-[12px] font-mono">
      <div class="flex items-center gap-2">
        <span class="text-base">🚨</span>
        <span class="font-bold">系统进入 review_pending</span>
        <span class="opacity-90"
              x-text="'reason=' + (reviewPending && reviewPending.reason)"></span>
        <span class="opacity-75 text-[11px]"
              x-text="'entered=' + (reviewPending && reviewPending.entered_at_utc)"></span>
      </div>
      <button @click="rpModalOpen = true"
              class="px-3 py-1 bg-white text-rose-700 rounded font-bold hover:bg-rose-50
                     transition-colors text-[12px]">
        解除 review_pending →
      </button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 解除 review_pending 模态框(D4=b 二次确认)                    -->
  <!-- ============================================================ -->
  <div x-show="rpModalOpen" x-cloak
       class="fixed inset-0 z-50 bg-black/50 flex items-center justify-center px-4">
    <div class="bg-white dark:bg-slate-900 rounded-lg shadow-xl
                max-w-lg w-full p-5 space-y-4 text-[13px]">
      <h3 class="text-base font-bold flex items-center gap-2">
        <span>🚨</span><span>解除 review_pending</span>
      </h3>
      <div class="bg-slate-50 dark:bg-slate-800 rounded p-2 text-[11px] font-mono">
        <div>reason:<span x-text="reviewPending && reviewPending.reason"></span></div>
        <div>entered:<span x-text="reviewPending && reviewPending.entered_at_utc"></span></div>
      </div>
      <div>
        <label class="block text-[11px] font-mono text-slate-500 mb-1">
          出口类型(D4=b 二次确认):
        </label>
        <select x-model="rpExitType"
                class="w-full font-mono text-[12px] border border-slate-300
                       dark:border-slate-700 rounded px-2 py-1
                       bg-white dark:bg-slate-950">
          <option value="a">EXIT_A - 调阈值(降 grade 门槛 / 调 cooldown)</option>
          <option value="b">EXIT_B - 续期 thesis(master AI 重出 break_conditions)</option>
          <option value="c">EXIT_C - reset 熔断(清 14d_fuse 历史)</option>
          <option value="d">EXIT_D - 自然恢复(只对 overly_conservative 生效)</option>
        </select>
      </div>
      <div>
        <label class="block text-[11px] font-mono text-slate-500 mb-1">
          解除理由(D4=c min 10 字符,写入 system_states.exit_reason):
        </label>
        <textarea x-model="rpReason" rows="3"
                  class="w-full text-[12px] border border-slate-300
                         dark:border-slate-700 rounded px-2 py-1
                         bg-white dark:bg-slate-950"
                  placeholder="为什么要解除?(min 10 字符,记入审计)"></textarea>
        <div class="text-[10px] text-slate-500 mt-0.5"
             x-text="'当前 ' + (rpReason || '').trim().length + ' 字符 / 至少 10'"></div>
      </div>
      <div x-show="rpResolveError"
           class="text-[11px] text-rose-600 dark:text-rose-400"
           x-text="rpResolveError"></div>
      <div class="flex justify-end gap-2 pt-2">
        <button @click="rpModalOpen = false; rpResolveError = ''"
                class="px-3 py-1 text-[12px] border border-slate-300
                       dark:border-slate-700 rounded hover:bg-slate-100
                       dark:hover:bg-slate-800">取消</button>
        <button @click="resolveReviewPending()"
                :disabled="(rpReason || '').trim().length < 10"
                class="px-3 py-1 text-[12px] bg-rose-600 text-white rounded
                       hover:bg-rose-700 disabled:opacity-40
                       disabled:cursor-not-allowed">确认解除</button>
      </div>
    </div>
  </div>

  <template x-if="loading">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 py-6 text-xs text-slate-500">加载中…</div>
  </template>
  <template x-if="error">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 py-6 text-xs text-rose-600">
      加载失败:<span x-text="error"></span>
    </div>
  </template>
  <template x-if="!loading && state && dataSource === 'mock'">
    <div class="bg-amber-50 dark:bg-amber-950/40 border-b border-amber-200 dark:border-amber-900/50
                text-amber-900 dark:text-amber-200 text-[11px] px-3 lg:px-4 py-1.5">
      <strong>MOCK 数据</strong>:/api/strategy/current 暂不可用,回退到 mock JSON(开发预览用)。
    </div>
  </template>

  <template x-if="!loading && state">
  <main class="max-w-7xl mx-auto px-3 lg:px-4 py-3 lg:py-4 space-y-4">

    <!-- ============================================================ -->
    <!-- ⚠️ 风险警告条(1.8.2-D):异常时显示,正常时隐藏                 -->
    <!-- ============================================================ -->
    <section x-show="(state.anti_patterns_active || []).length > 0
                  || (state.extreme_events_active || []).length > 0"
             x-cloak class="space-y-1">
      <div x-show="(state.extreme_events_active || []).length > 0"
           class="bg-rose-50 dark:bg-rose-950/30 border border-rose-200 dark:border-rose-900
                  rounded p-2.5 text-[12px]">
        <template x-for="e in (state.extreme_events_active || [])" :key="e">
          <div x-text="e" class="leading-snug"></div>
        </template>
      </div>
      <div x-show="(state.anti_patterns_active || []).length > 0"
           class="bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900
                  rounded p-2.5 text-[12px]">
        <template x-for="p in (state.anti_patterns_active || [])" :key="p">
          <div x-text="p" class="leading-snug"></div>
        </template>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 顶部全局状态条(§9.3)                                        -->
    <!-- ============================================================ -->
    <section class="audit-card px-3 py-2" id="top-market-overview">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 items-start">
        <div class="md:col-span-2 lg:col-span-2">
          <div class="stat-label flex items-center gap-1.5">
            <span>BTC 现价</span>
            <span class="text-[8.5px] normal-case text-slate-400 dark:text-slate-500 tracking-normal"
                  x-text="livePriceSourceLabel()"></span>
          </div>
          <div class="flex items-baseline gap-1.5">
            <span class="text-xl lg:text-2xl font-mono font-bold tabular-nums"
                  x-text="formatPrice(livePrice())"></span>
            <span class="text-[11px] font-mono tabular-nums"
                  :class="(livePrice24hChange() ?? 0) >= 0
                           ? 'text-emerald-600 dark:text-emerald-400'
                           : 'text-rose-600 dark:text-rose-400'"
                  x-text="formatPct(livePrice24hChange(), true)"></span>
          </div>
          <div class="text-[10px] text-slate-500 dark:text-slate-400 flex items-center gap-1">
            <span x-text="'采集 ' + (livePriceCapturedAt() || '-')"></span>
            <span x-show="livePriceStale()" class="text-amber-600 dark:text-amber-400"
                  title="数据陈旧:现货 > 2 分钟 / K 线 fallback > 30 分钟">·stale</span>
          </div>
        </div>
        <div class="rounded border border-slate-200 dark:border-slate-800 px-2.5 py-2 min-w-0">
          <div class="stat-label">大周期策略</div>
          <div class="text-[13px] font-bold truncate" x-text="topSpotActionSummary()"></div>
          <div class="text-[11px] text-slate-500 dark:text-slate-400 truncate"
               x-text="topSpotStageSummary()"></div>
          <div class="text-[10px] font-mono tabular-nums text-slate-500 truncate"
               x-text="topSpotUpdatedAt()"></div>
        </div>
        <div class="rounded border border-slate-200 dark:border-slate-800 px-2.5 py-2 min-w-0">
          <div class="stat-label">波段策略</div>
          <div class="text-[13px] font-bold truncate" x-text="topSwingStatusSummary()"></div>
          <div class="text-[11px] text-slate-500 dark:text-slate-400 truncate"
               x-text="topSwingActionSummary()"></div>
          <div class="text-[10px] font-mono tabular-nums text-slate-500 truncate"
               x-text="topSwingUpdatedAt()"></div>
        </div>
        <div class="rounded border border-slate-200 dark:border-slate-800 px-2.5 py-2 min-w-0">
          <div class="stat-label">系统状态</div>
          <div class="text-[13px] font-bold truncate" x-text="topSystemStatusSummary()"></div>
          <div class="text-[11px] text-slate-500 dark:text-slate-400 truncate"
               x-text="topDataStatusSummary()"></div>
          <div class="text-[10px] text-slate-500 truncate" x-text="topFallbackSummary()"></div>
        </div>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 🩺 系统自检面板(Sprint 1.5o):永久展开,作为"系统是否在正常 -->
    <!-- 运作"的唯一入口。容器边框颜色随 overall_status 变化。           -->
    <!-- ============================================================ -->
    <section class="audit-card"
             :class="systemHealth && systemHealth.overall_status === 'critical'
                     ? 'border-rose-400 dark:border-rose-700 ring-1 ring-rose-300 dark:ring-rose-800'
                     : systemHealth && systemHealth.overall_status === 'partial_degraded'
                       ? 'border-amber-300 dark:border-amber-700'
                       : 'border-emerald-200 dark:border-emerald-900'">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>🩺</span><span>系统自检</span>
          <span class="text-[11px] px-1.5 py-0.5 rounded font-mono ml-1"
                :class="selfCheckBadgeClass()"
                x-text="selfCheckBadgeLabel()"></span>
        </h2>
      </header>

      <div class="p-3 grid grid-cols-1 md:grid-cols-3 gap-4 text-[12px]">
        <!-- 第一列:Layer A 五层健康 -->
        <div>
          <h3 class="subheading mb-1.5">Layer A 五层</h3>
          <ul class="space-y-1">
            <template x-for="layer in layerAHealthItems()"
                      :key="layer.layer_id">
              <li class="flex items-center gap-2 leading-snug"
                  :title="layer.missing_reasons && layer.missing_reasons.length
                          ? layer.missing_reasons.join(' / ')
                          : layer.pillars_summary">
                <span class="text-base shrink-0"
                      :class="layerHealthGlyphClass(layer.health)"
                      x-text="layerHealthGlyph(layer.health)"></span>
                <span class="font-mono w-7 text-slate-500"
                      x-text="layer.layer_id"></span>
                <span class="font-medium"
                      :class="layerHealthTextClass(layer.health)"
                      x-text="layer.name"></span>
                <span class="ml-auto text-[11px]"
                      :class="layerHealthTextClass(layer.health)"
                      x-text="layer.health === 'healthy' ? 'healthy'
                              : layer.health === 'degraded' ? 'degraded'
                              : 'missing'"></span>
              </li>
            </template>
          </ul>
        </div>

        <!-- 第二列:Layer B 五层证据健康 -->
        <div>
          <h3 class="subheading mb-1.5">Layer B 五层</h3>
          <ul class="space-y-1">
            <template x-for="layer in (systemHealth?.evidence_layers || [])"
                      :key="layer.layer_id">
              <li class="flex items-center gap-2 leading-snug"
                  :title="layer.missing_reasons && layer.missing_reasons.length
                          ? layer.missing_reasons.join(' / ')
                          : layer.pillars_summary">
                <span class="text-base shrink-0"
                      :class="layerHealthGlyphClass(layer.health)"
                      x-text="layerHealthGlyph(layer.health)"></span>
                <span class="font-mono w-7 text-slate-500"
                      x-text="'L' + layer.layer_id"></span>
                <span class="font-medium"
                      :class="layerHealthTextClass(layer.health)"
                      x-text="layer.name"></span>
                <span class="ml-auto text-[11px]"
                      :class="layerHealthTextClass(layer.health)"
                      x-text="layer.health === 'healthy' ? 'healthy'
                              : layer.health === 'degraded' ? 'degraded'
                              : 'missing'"></span>
              </li>
            </template>
          </ul>
        </div>

        <!-- 第三列:数据源新鲜度(Sprint B:读 /api/data_sources/freshness 真实状态) -->
        <div>
          <h3 class="subheading mb-1.5">数据源</h3>
          <ul class="space-y-1">
            <template x-for="src in (dataSourcesFreshness || [])"
                      :key="src.source">
              <li class="leading-snug" :title="sourceTooltip(src)">
                <div class="flex items-center gap-2">
                  <span class="text-base shrink-0"
                        :class="sourceStatusGlyphClass(src.status)"
                        x-text="sourceStatusGlyph(src.status)"></span>
                  <span class="flex-1 flex items-center gap-1.5"
                        :class="sourceTextClass(src.status)">
                    <span x-text="src.display_name"></span>
                    <span x-show="src.status === 'failure' && src.failure_reason_label"
                          class="px-1.5 py-px rounded text-[10px] font-semibold leading-none"
                          :class="sourceReasonBadgeClass(src.failure_reason)"
                          x-text="src.failure_reason_label"></span>
                  </span>
                  <span class="font-mono tabular-nums shrink-0 text-[11px]"
                        :class="sourceTextClass(src.status)"
                        x-text="sourceAgeLabel(src)"></span>
                </div>
                <div x-show="src.status !== 'success'"
                     class="ml-6 text-[10px] text-slate-400 dark:text-slate-500"
                     x-text="sourceStaleHint(src)"></div>
              </li>
            </template>
          </ul>
        </div>
      </div>
      <p class="px-3 pb-3 text-[10px] text-slate-400">
        每 5 分钟自动刷新;hover 行可看 hover tooltip(详细原因 / 抓取时间)
      </p>
    </section>

    <!-- ============================================================ -->
    <!-- 🌕 大周期策略(Layer A):现货仓独立策略,不进入虚拟账户       -->
    <!-- ============================================================ -->
    <section id="region-layer-a-spot" class="audit-card lg:col-span-5">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>🌕</span><span>大周期策略</span>
          <span class="text-[11px] font-normal text-slate-500 ml-1">Layer A · 现货仓</span>
        </h2>
        <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5">
          只判断 BTC 现货大周期;不做空、不进虚拟账户、不创建 thesis、不影响五层波段仓
        </p>
        <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5"
           x-show="spotStrategy()"
           x-text="'大周期策略更新时间：' + spotStrategyUpdatedAt()"></p>
      </header>
      <div class="p-3 space-y-3">
        <template x-if="!spotStrategy()">
          <div class="text-[12px] text-slate-500 dark:text-slate-400 italic"
               data-fallback="暂无大周期策略，本 run 尚未记录 Layer A 输出。">
            <span x-text="spotStrategyFallbackText()"></span>
          </div>
        </template>
        <template x-if="spotStrategy()">
          <div class="space-y-3">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-[12px]">
              <div>
                <div class="stat-label">大周期阶段</div>
                <div class="text-[13px] font-bold"
                     x-text="spotCycleStageLabel(spotStrategy()?.a5_spot_adjudicator?.cycle_stage || spotStrategy()?.a1_cycle_stage?.cycle_stage)"></div>
              </div>
              <div>
                <div class="stat-label">策略</div>
                <div class="text-[13px] font-bold"
                     x-text="spotActionLabel(spotStrategy()?.a5_spot_adjudicator?.spot_action)"></div>
              </div>
              <div>
                <div class="stat-label">置信度</div>
                <div class="text-[13px] font-bold"
                     x-text="spotConfidenceLabel(spotStrategy()?.a5_spot_adjudicator?.confidence)"></div>
              </div>
              <div>
                <div class="stat-label">风险</div>
                <div class="text-[13px] font-bold"
                     x-text="spotRiskLabel(spotStrategy()?.a4_spot_risk?.spot_risk_level)"></div>
              </div>
            </div>

            <div class="rounded border border-slate-200 dark:border-slate-800 p-3">
              <div class="text-[13px] font-bold leading-snug"
                   x-text="spotFinalAdvice()"></div>
              <p class="mt-1 text-[12px] leading-snug text-slate-700 dark:text-slate-300"
                 x-text="spotFinalSummary()"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              <template x-for="card in spotLayerCards()" :key="card.key">
                <article class="border border-slate-200 dark:border-slate-800 rounded p-3 space-y-2 min-w-0">
                  <header class="flex items-baseline justify-between gap-2">
                    <h3 class="text-[12px] font-semibold text-slate-600 dark:text-slate-400"
                        x-text="card.title"></h3>
                    <span class="px-1.5 py-0.5 rounded text-[10px] bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400"
                          x-text="card.badge"></span>
                  </header>
                  <div class="text-[13px] font-bold leading-snug" x-text="card.label || '-'"></div>
                  <p class="text-[12px] leading-snug text-slate-700 dark:text-slate-300"
                     :title="card.summary || '-'"
                     x-text="spotCardSummary(card)"></p>
                  <button @click="toggleLayerCard(card.key)"
                          class="text-[11px] text-blue-600 dark:text-cyan-400 hover:underline">
                    <span x-show="!layerCardOpen(card.key)">查看详细 ▼</span>
                    <span x-show="layerCardOpen(card.key)">收起 ▲</span>
                  </button>
                  <div x-show="layerCardOpen(card.key)" x-cloak
                       class="space-y-2 pt-2 border-t border-slate-100 dark:border-slate-800 text-[11.5px]">
                    <div x-show="(card.supporting || []).length > 0">
                      <div class="stat-label mb-1">支持证据</div>
                      <ul class="space-y-0.5">
                        <template x-for="item in (card.supporting || [])" :key="item">
                          <li class="leading-snug" x-text="'• ' + item"></li>
                        </template>
                      </ul>
                    </div>
                    <div x-show="(card.opposing || []).length > 0">
                      <div class="stat-label mb-1">反方证据</div>
                      <ul class="space-y-0.5">
                        <template x-for="item in (card.opposing || [])" :key="item">
                          <li class="leading-snug" x-text="'• ' + item"></li>
                        </template>
                      </ul>

    <!-- ============================================================ -->
    <!-- 📊 模块 5:周复盘报告(Sprint 1.10-I §9.2.5 + D3=a)         -->

    <section id="region-weekly-review" class="audit-card">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800

          <div class="space-y-3">

              <div class="stat-label mb-1">周表现摘要</div>
              <div class="grid grid-cols-2 md:grid-cols-4 gap-2 font-mono tabular-nums">
                <div>
                  <span class="text-slate-500">runs</span>
                  <span class="ml-1 font-bold"
                        x-text="(weeklyReviewSelected.output.performance_summary || {}).total_runs ?? '-'"></span>
                </div>
                <div>
                  <span class="text-slate-500">AI 失败</span>
                  <span class="ml-1 font-bold"
                        x-text="(weeklyReviewSelected.output.performance_summary || {}).ai_failures ?? '-'"></span>
                </div>
                <div>
                  <span class="text-slate-500">PnL</span>
                  <span class="ml-1 font-bold"
                        :class="((weeklyReviewSelected.output.performance_summary || {}).weekly_pnl_pct ?? 0) >= 0
                                  ? 'text-emerald-600' : 'text-rose-600'"
                        x-text="formatPct((weeklyReviewSelected.output.performance_summary || {}).weekly_pnl_pct, true)"></span>
                </div>
                <div>
                  <span class="text-slate-500">最大回撤</span>
                  <span class="ml-1 font-bold"

                </div>
              </div>
            </div>
            <!-- sample_base:Validator 分母是有效决策样本,不是 days -->
            <div class="border-t border-slate-200 dark:border-slate-800 pt-2">
              <div class="stat-label mb-1">样本口径</div>
              <template x-if="weeklyReviewSampleBase()">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-2 font-mono tabular-nums">
                  <div>
                    <span class="text-slate-500">总 run</span>
                    <span class="ml-1 font-bold"

                  </div>
                  <div>
                    <span class="text-slate-500">Validator 有效样本</span>

                </div>
              </template>
              <template x-if="!weeklyReviewSampleBase()">

                    <span x-text="d.issue"></span>
                    <div class="text-slate-500"
                         x-text="'evidence: ' + (d.evidence || '-')"></div>
                    <div class="text-slate-500"
                         x-text="'建议: ' + (d.suggested_action || '-')"></div>
                  </li>
                </template>
              </ul>
            </div>
            <!-- adjustment_recommendations(按优先级排序) -->
            <div x-show="(weeklyReviewSelected.output.adjustment_recommendations || []).length > 0">
              <div class="stat-label mb-1">调整建议</div>
              <ul class="space-y-1">
                <template x-for="(r, i) in (weeklyReviewSelected.output.adjustment_recommendations || [])"

                          :class="r['优先级'] === 'high' ? 'bg-rose-100 text-rose-700 dark:bg-rose-950 dark:text-rose-400'

                          x-text="(r['优先级'] || 'low').toUpperCase()"></span>

                    <div class="text-slate-500"

                    <div class="text-slate-500"

                    <template x-if="r.duplicate_recommendation_id || r.unstable_recommendation_id">

                        <span x-show="r.unstable_recommendation_id">不稳定 recommendation_id，已生成 normalized_recommendation_id</span>
                      </div>
                    </template>
                    <template x-if="r.possible_repetition_without_confirmation">
                      <div class="text-amber-600 dark:text-amber-400">

                      </div>
                    </template>
                    <div class="text-slate-500" x-text="'影响: ' + (r['影响'] || '')"></div>
                  </li>
                </template>
              </ul>
            </div>
            <!-- temporal consistency diagnostics -->
            <div class="border-t border-slate-200 dark:border-slate-800 pt-2">
              <div class="stat-label mb-1">时间连续性 / 证据置信度</div>

                <div class="text-slate-500 dark:text-slate-400 italic">

              </template>
              <div x-show="hasWeeklyReviewTemporalDiagnostics()" class="space-y-2 text-[11px]">

                    <span class="text-slate-500">连续 elevated 周数</span>

                  </div>
                  <div>
                    <span class="text-slate-500">连续 V16 偏高周数</span>
                    <span class="ml-1 font-bold"

                      <div class="font-mono" x-text="'recommendation_id: ' + formatReviewValue(r.recommendation_id)"></div>
                      <div x-text="'category: ' + formatReviewValue(r.category) + ' | target: ' + formatReviewValue(r.target) + ' | action_type: ' + formatReviewValue(r.action_type)"></div>

                        <span x-text="'position_cap_multiplier=' + formatReviewValue(s.position_cap_multiplier)"></span>
                        <div class="text-slate-500" x-text="'risk_breakdown: ' + formatReviewValue(s.risk_breakdown)"></div>
                        <div class="text-slate-500" x-text="'master_action: ' + formatReviewValue(s.master_action) + ', btc_price: ' + formatReviewValue(s.btc_price)"></div>
                      </div>
                    </template>
                  </div>
                </div>

                <div>
                  <div class="font-semibold text-slate-700 dark:text-slate-300">Validator 诊断</div>
                  <div>
                    <div class="text-slate-500">top_triggered_validators</div>
                    <template x-for="(v, i) in (weeklyReviewDiagnostics().validator.top_triggered_validators || [])" :key="i">
                      <div class="font-mono"
                           x-text="formatReviewValue(v.validator_name) + ': ' + formatReviewValue(v.activations)"></div>
                    </template>
                  </div>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mt-1">
                    <div>
                      <div class="text-slate-500">V16 samples</div>
                      <template x-for="(s, i) in (weeklyReviewDiagnostics().validator.v16_samples || [])" :key="i">
                        <div class="border-l-2 border-slate-300 dark:border-slate-700 pl-2 mt-1">
                          <div x-text="formatReviewValue(s.run_at) + ' | ' + formatReviewValue(s.validator_name)"></div>
                          <div class="text-slate-500" x-text="'activation_reason: ' + formatReviewValue(s.activation_reason || s.message)"></div>
                          <div class="text-slate-500" x-text="'master_action: ' + formatReviewValue(s.master_action)"></div>
                          <div class="text-slate-500" x-text="'what_would_change_mind: ' + formatReviewValue(s.what_would_change_mind)"></div>
                        </div>
                      </template>
                    </div>
                    <div>
                      <div class="text-slate-500">V23 samples</div>
                      <template x-for="(s, i) in (weeklyReviewDiagnostics().validator.v23_samples || [])" :key="i">
                        <div class="border-l-2 border-slate-300 dark:border-slate-700 pl-2 mt-1">
                          <div x-text="formatReviewValue(s.run_at) + ' | ' + formatReviewValue(s.validator_name)"></div>
                          <div class="text-slate-500" x-text="'activation_reason: ' + formatReviewValue(s.activation_reason || s.message)"></div>
                          <div class="text-slate-500" x-text="'master_action: ' + formatReviewValue(s.master_action)"></div>
                          <div class="text-slate-500" x-text="'conflict_resolution: ' + formatReviewValue(s.conflict_resolution)"></div>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- 23 V evaluation 表(可折叠) -->
            <details class="border-t border-slate-200 dark:border-slate-800 pt-2">
              <summary class="cursor-pointer text-[11px] font-mono text-slate-500
                              hover:text-slate-700 dark:hover:text-slate-300">
                展开 23 条 Validator 激活率表
              </summary>
              <div class="mt-2">
                <table class="w-full text-[10px] font-mono tabular-nums">
                  <thead class="text-slate-500 border-b border-slate-200 dark:border-slate-800">
                    <tr><th class="text-left">Validator</th><th class="text-right">激活</th>
                        <th class="text-right">rate</th><th class="text-left">评估</th></tr>
                  </thead>
                  <tbody>
                    <template x-for="vk in validatorKeys()" :key="vk">
                      <tr class="border-b border-slate-100 dark:border-slate-900">
                        <td class="py-0.5" x-text="vk.replace('validator_', 'V').replace(/_/g, ' ')"></td>
                        <td class="text-right"
                            x-text="((weeklyReviewSelected.output.hard_constraint_activation_review || {})[vk] || {}).activations ?? '-'"></td>
                        <td class="text-right"
                            x-text="formatValidatorRate(((weeklyReviewSelected.output.hard_constraint_activation_review || {})[vk] || {}).rate)"></td>
                        <td class="text-slate-500"
                            x-text="((weeklyReviewSelected.output.hard_constraint_activation_review || {})[vk] || {}).evaluation || '-'"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </details>
          </div>
        </template>
      </div>
    </section>

    <!-- Footer -->
    <footer class="pt-2 pb-4 text-[10px] text-slate-500 dark:text-slate-500 flex flex-wrap gap-3">
      <span>Data: CoinGlass / Glassnode / FRED / local calendar</span>
      <span>Rules <span x-text="state.meta && state.meta.rules_version"></span></span>
      <span>Model <span x-text="state.meta && state.meta.ai_model_actual"></span></span>
      <span>Source <span class="font-mono" x-text="dataSource"></span></span>
      <span class="ml-auto">策略审计层 • 非自动交易 • 决策由你</span>
    </footer>
  </main>
  </template>
</body>
</html>
