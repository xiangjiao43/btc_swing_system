<!DOCTYPE html>
<html lang="zh-CN" x-data="app()" x-init="init()" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC 策略审计台</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Inter"', '"PingFang SC"', '"Microsoft YaHei"',
                   'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"SF Mono"', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>
  <script src="/assets/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>

<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100
             font-sans antialiased transition-colors min-h-screen">

  <!-- ============================================================ -->
  <!-- Sticky Top Nav                                               -->
  <!-- ============================================================ -->
  <header class="sticky top-0 z-30 border-b border-slate-200 dark:border-slate-800
                 bg-white/95 dark:bg-slate-950/95 backdrop-blur">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 h-10 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-600 dark:bg-cyan-400"></span>
        <span class="text-[13px] font-semibold tracking-tight">BTC Strategy</span>
        <span class="hidden sm:inline text-[11px] text-slate-500 dark:text-slate-400">策略审计台</span>
      </div>
      <div class="flex items-center gap-3 text-[11px]">
        <span class="hidden sm:inline font-mono"
              :class="dataSource === 'api' ? 'text-emerald-600 dark:text-emerald-400'
                                           : 'text-amber-600 dark:text-amber-400'"
              x-text="dataSourceLabel"></span>
        <span class="font-mono tabular-nums text-slate-600 dark:text-slate-400"
              x-text="nowBjt"></span>
        <button @click="toggleDark()"
                class="w-7 h-7 rounded flex items-center justify-center
                       hover:bg-slate-100 dark:hover:bg-slate-800 transition"
                :title="darkMode ? '切换到白天' : '切换到夜间'">
          <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <template x-if="loading">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 py-6 text-xs text-slate-500">加载中…</div>
  </template>
  <template x-if="error">
    <div class="max-w-7xl mx-auto px-3 lg:px-4 py-6 text-xs text-rose-600">
      加载失败:<span x-text="error"></span>
    </div>
  </template>
  <template x-if="!loading && state && dataSource === 'mock'">
    <div class="bg-amber-50 dark:bg-amber-950/40 border-b border-amber-200 dark:border-amber-900/50
                text-amber-900 dark:text-amber-200 text-[11px] px-3 lg:px-4 py-1.5">
      <strong>MOCK 数据</strong>:/api/strategy/current 暂不可用,回退到 mock JSON(开发预览用)。
    </div>
  </template>

  <template x-if="!loading && state">
  <main class="max-w-7xl mx-auto px-3 lg:px-4 py-3 lg:py-4 space-y-4">

    <!-- ============================================================ -->
    <!-- ⚠️ 风险警告条(1.8.2-D):异常时显示,正常时隐藏                 -->
    <!-- ============================================================ -->
    <section x-show="(state.anti_patterns_active || []).length > 0
                  || (state.extreme_events_active || []).length > 0"
             x-cloak class="space-y-1">
      <div x-show="(state.extreme_events_active || []).length > 0"
           class="bg-rose-50 dark:bg-rose-950/30 border border-rose-200 dark:border-rose-900
                  rounded p-2.5 text-[12px]">
        <template x-for="e in (state.extreme_events_active || [])" :key="e">
          <div x-text="e" class="leading-snug"></div>
        </template>
      </div>
      <div x-show="(state.anti_patterns_active || []).length > 0"
           class="bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900
                  rounded p-2.5 text-[12px]">
        <template x-for="p in (state.anti_patterns_active || [])" :key="p">
          <div x-text="p" class="leading-snug"></div>
        </template>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 顶部全局状态条(§9.3)                                        -->
    <!-- ============================================================ -->
    <section class="audit-card px-3 py-2">
      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 items-center">
        <div class="col-span-2 md:col-span-1 lg:col-span-2">
          <div class="stat-label flex items-center gap-1.5">
            <span>BTC 现价</span>
            <span class="text-[8.5px] normal-case text-slate-400 dark:text-slate-500 tracking-normal"
                  x-text="livePriceSourceLabel()"></span>
          </div>
          <div class="flex items-baseline gap-1.5">
            <span class="text-xl lg:text-2xl font-mono font-bold tabular-nums"
                  x-text="formatPrice(livePrice())"></span>
            <span class="text-[11px] font-mono tabular-nums"
                  :class="(livePrice24hChange() ?? 0) >= 0
                           ? 'text-emerald-600 dark:text-emerald-400'
                           : 'text-rose-600 dark:text-rose-400'"
                  x-text="formatPct(livePrice24hChange(), true)"></span>
          </div>
          <div class="text-[10px] text-slate-500 dark:text-slate-400 flex items-center gap-1">
            <span x-text="'采集 ' + (livePriceCapturedAt() || '—')"></span>
            <span x-show="livePriceStale()" class="text-amber-600 dark:text-amber-400"
                  title="数据陈旧:现货 > 2 分钟 / K 线 fallback > 30 分钟">·stale</span>
          </div>
        </div>
        <div>
          <div class="stat-label">状态</div>
          <span class="inline-block px-1.5 py-0.5 rounded text-[13px] font-bold font-mono"
                :class="stateColor(state.main_strategy.action_state)"
                x-text="state.main_strategy.action_state"></span>
        </div>
        <div>
          <div class="stat-label">生命周期</div>
          <div class="text-[13px]" x-text="state.main_strategy.lifecycle_phase || '—'"></div>
        </div>
        <div>
          <div class="stat-label">机会 / 许可</div>
          <div class="text-[13px] font-mono"
               x-text="(state.main_strategy.opportunity_grade || '—') + ' / ' +
                       (state.main_strategy.execution_permission || '—')"></div>
        </div>
        <div>
          <div class="stat-label">观察类别</div>
          <span class="inline-block px-1.5 py-0.5 rounded-full text-[10.5px]"
                :class="observationColor(state.main_strategy.observation_category)"
                x-text="observationLabel(state.main_strategy.observation_category)"></span>
        </div>
        <div>
          <div class="stat-label">下次运行</div>
          <div class="text-[13px] font-mono tabular-nums" x-text="countdownLabel"></div>
        </div>
        <div class="col-span-2 md:col-span-1">
          <div class="stat-label">数据 / Fallback</div>
          <div class="flex items-center gap-1.5 text-[11px]">
            <span class="inline-block w-1.5 h-1.5 rounded-full"
                  :class="healthColor(state.data_health && state.data_health.overall)"></span>
            <span class="font-mono tabular-nums"
                  x-text="(state.data_health && state.data_health.data_completeness_pct != null
                           ? state.data_health.data_completeness_pct.toFixed(0) + '%'
                           : '—')"></span>
            <span class="text-slate-400">|</span>
            <span :class="fallbackLabelClass(state.meta && state.meta.fallback_level)"
                  x-text="fallbackLabel(state.meta && state.meta.fallback_level)"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 🩺 系统自检面板(Sprint 1.5o):永久展开,作为"系统是否在正常 -->
    <!-- 运作"的唯一入口。容器边框颜色随 overall_status 变化。           -->
    <!-- ============================================================ -->
    <section class="audit-card px-3 py-2.5"
             :class="systemHealth && systemHealth.overall_status === 'critical'
                     ? 'border-rose-400 dark:border-rose-700 ring-1 ring-rose-300 dark:ring-rose-800'
                     : systemHealth && systemHealth.overall_status === 'partial_degraded'
                       ? 'border-amber-300 dark:border-amber-700'
                       : 'border-emerald-200 dark:border-emerald-900'">
      <div class="flex items-center gap-2 text-[12px] mb-2.5">
        <span class="font-semibold">🩺 系统自检</span>
        <span class="text-[11px] px-1.5 py-0.5 rounded font-mono"
              :class="selfCheckBadgeClass()"
              x-text="selfCheckBadgeLabel()"></span>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-[12px]">
        <!-- 左列:5 层证据健康 -->
        <div>
          <h3 class="subheading mb-1.5">五层证据</h3>
          <ul class="space-y-1">
            <template x-for="layer in (systemHealth?.evidence_layers || [])"
                      :key="layer.layer_id">
              <li class="flex items-center gap-2 leading-snug"
                  :title="layer.missing_reasons && layer.missing_reasons.length
                          ? layer.missing_reasons.join(' / ')
                          : layer.pillars_summary">
                <span class="text-base shrink-0"
                      :class="layerHealthGlyphClass(layer.health)"
                      x-text="layerHealthGlyph(layer.health)"></span>
                <span class="font-mono w-7 text-slate-500"
                      x-text="'L' + layer.layer_id"></span>
                <span class="font-medium"
                      :class="layerHealthTextClass(layer.health)"
                      x-text="layer.name"></span>
                <span class="ml-auto text-[11px]"
                      :class="layerHealthTextClass(layer.health)"
                      x-text="layer.health === 'healthy' ? 'healthy'
                              : layer.health === 'degraded' ? 'degraded'
                              : 'missing'"></span>
              </li>
            </template>
          </ul>
        </div>

        <!-- 右列:数据源新鲜度 -->
        <div>
          <h3 class="subheading mb-1.5">数据源</h3>
          <ul class="space-y-1">
            <template x-for="src in (systemHealth?.data_sources || [])"
                      :key="src.name">
              <li class="flex items-center gap-2 leading-snug"
                  :title="(src.captured_at_bjt || '无数据') + ' · ' + src.expected_cadence">
                <span class="text-base shrink-0"
                      :class="sourceStatusGlyphClass(src.status)"
                      x-text="sourceStatusGlyph(src.status)"></span>
                <span class="flex-1"
                      :class="sourceTextClass(src.status)"
                      x-text="src.name"></span>
                <span class="font-mono tabular-nums shrink-0 text-[11px]"
                      :class="sourceTextClass(src.status)"
                      x-text="sourceAgeLabel(src)"></span>
              </li>
            </template>
          </ul>
        </div>
      </div>
      <p class="mt-2 text-[10px] text-slate-400">
        每 5 分钟自动刷新;hover 行可看 hover tooltip(详细原因 / 抓取时间)
      </p>
    </section>

    <!-- ============================================================ -->
    <!-- 🎯 核心建议与高阶信号:区域 1(60% 左)+ 区域 3(40% 右)     -->
    <!-- Sprint 2.3 R4:lg:grid-cols-5 · 3/2 分栏;手机端自然上下堆叠。-->
    <!-- ============================================================ -->
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-4 items-start">

    <!-- ============================================================ -->
    <!-- 🎯 AI 策略建议(1.8.2-D 重构):13 张小卡,分 4 行             -->
    <!-- ============================================================ -->
    <section id="region-1" class="audit-card lg:col-span-5">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>🎯</span><span>AI 策略建议</span>
          <span class="ml-auto text-[10px] text-slate-500" x-show="state.meta?.generated_at_bjt"
                x-text="'AI 输出于 ' + (state.meta?.generated_at_bjt || '—')"></span>
        </h2>
      </header>
      <!-- 1.8.2-K:13 卡 → 12 卡平铺(2 行 × 6 张),无边框 / 无灰底,标签小灰 + 数值黑中 -->
      <div class="p-4 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-x-8 gap-y-6">
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">方向</div>
          <div class="text-xl font-medium text-slate-900 dark:text-slate-100 mt-1"
               x-text="state.summary_card?.stance_label || '—'"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">状态</div>
          <div class="text-xl font-medium text-slate-900 dark:text-slate-100 mt-1"
               x-text="state.summary_card?.action_state_label || '—'"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">机会等级</div>
          <div class="text-xl font-medium text-slate-900 dark:text-slate-100 mt-1"
               x-text="cardOpportunityGrade()"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">信心指数</div>
          <div class="text-xl font-medium text-slate-900 dark:text-slate-100 mt-1"
               x-text="cardConfidence()"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">入场区间</div>
          <div class="text-sm font-mono text-slate-900 dark:text-slate-100 mt-1"
               x-html="cardEntryZones()"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">止损价</div>
          <div class="text-xl font-medium font-mono text-slate-900 dark:text-slate-100 mt-1"
               x-text="cardStopLoss()"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">止盈分批</div>
          <div class="text-sm font-mono text-slate-900 dark:text-slate-100 mt-1"
               x-html="cardTakeProfits()"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">仓位上限</div>
          <div class="text-xl font-medium text-slate-900 dark:text-slate-100 mt-1"
               x-text="cardPositionCap()"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">当前浮盈</div>
          <div class="text-xl font-medium text-slate-900 dark:text-slate-100 mt-1"
               x-text="cardCurrentPnl()"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">距离止损</div>
          <div class="text-xl font-medium font-mono text-slate-900 dark:text-slate-100 mt-1"
               x-text="cardDistanceToStop()"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">持仓时长</div>
          <div class="text-xl font-medium text-slate-900 dark:text-slate-100 mt-1"
               x-text="cardHoldingDuration()"></div>
        </div>
        <div>
          <div class="text-sm text-slate-500 dark:text-slate-400">硬失效位</div>
          <div class="text-sm font-mono text-slate-900 dark:text-slate-100 mt-1"
               x-html="cardHardInvalidations()"></div>
        </div>
      </div>
    </section>

    </div> <!-- /grid 核心建议与高阶信号 -->

    <!-- ============================================================ -->
    <!-- 🔬 五层分析(1.8.2-C):L1-L5 + master 6 张卡,密度 C 默认折叠  -->
    <!-- ============================================================ -->
    <section id="region-layer-cards" class="audit-card"
             x-show="(state.layer_cards || []).length > 0">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>🔬</span><span>五层分析</span>
          <span class="text-[11px] font-normal text-slate-500 ml-1">L1-L5 + 主裁</span>
        </h2>
        <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5">
          每层 AI 独立分析,综合判断;点"查看详细"展开关键观察 / 完整分析 / 矛盾信号
        </p>
      </header>
      <div class="p-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
        <template x-for="(card, idx) in (state.layer_cards || [])" :key="card.layer">
          <article class="border border-slate-200 dark:border-slate-800 rounded p-3
                          space-y-2 min-w-0">
            <!-- 标题 -->
            <header class="flex items-baseline justify-between gap-2">
              <h3 class="text-[12px] font-semibold text-slate-600 dark:text-slate-400"
                  x-text="card.title"></h3>
            </header>
            <!-- 大字标签 -->
            <div class="text-base font-bold leading-snug" x-text="card.label || '—'"></div>
            <!-- 次要标签 -->
            <div class="flex flex-wrap gap-1" x-show="(card.secondary_labels || []).length > 0">
              <template x-for="sl in (card.secondary_labels || [])" :key="sl">
                <span class="px-1.5 py-0.5 rounded text-[10px]
                             bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400"
                      x-text="sl"></span>
              </template>
            </div>
            <!-- 摘要(默认看)-->
            <p class="text-[12px] leading-snug text-slate-700 dark:text-slate-300"
               x-text="card.summary || '—'"></p>
            <!-- 查看详细按钮 -->
            <button @click="toggleLayerCard(card.layer)"
                    class="text-[11px] text-blue-600 dark:text-cyan-400 hover:underline">
              <span x-show="!layerCardOpen(card.layer)">查看详细 ▼</span>
              <span x-show="layerCardOpen(card.layer)">收起 ▲</span>
            </button>
            <!-- 详细区(展开后)-->
            <div x-show="layerCardOpen(card.layer)" x-cloak
                 class="space-y-2.5 pt-2 border-t border-slate-100 dark:border-slate-800">
              <!-- 关键观察 -->
              <div x-show="(card.key_observations || []).length > 0">
                <h4 class="text-[11px] font-semibold text-slate-600 dark:text-slate-400 mb-1">
                  关键观察
                </h4>
                <ul class="space-y-0.5 text-[11.5px] leading-snug">
                  <template x-for="obs in (card.key_observations || [])" :key="obs">
                    <li class="flex items-start gap-1.5">
                      <span class="text-slate-400 shrink-0">•</span>
                      <span x-text="obs"></span>
                    </li>
                  </template>
                </ul>
              </div>
              <!-- 完整分析 -->
              <div x-show="card.narrative">
                <h4 class="text-[11px] font-semibold text-slate-600 dark:text-slate-400 mb-1">
                  完整分析
                </h4>
                <p class="text-[11.5px] leading-snug text-slate-700 dark:text-slate-300"
                   x-text="card.narrative"></p>
              </div>
              <!-- 矛盾信号 -->
              <div x-show="(card.contradicting_signals || []).length > 0">
                <h4 class="text-[11px] font-semibold text-amber-600 dark:text-amber-400 mb-1">
                  ⚠️ 矛盾信号
                </h4>
                <ul class="space-y-0.5 text-[11.5px] leading-snug">
                  <template x-for="cs in (card.contradicting_signals || [])" :key="cs">
                    <li class="flex items-start gap-1.5">
                      <span class="text-amber-500 shrink-0">•</span>
                      <span x-text="cs"></span>
                    </li>
                  </template>
                </ul>
              </div>
            </div>
          </article>
        </template>
      </div>
    </section>

    <!-- Sprint 1.5o:整块删除「五层证据推导细节」区(用户反馈无价值,
         健康信号已在顶部「🩺 系统自检」面板里展示)。 -->

    <!-- ============================================================ -->
    <!-- 📂 区域 4:原始因子(5 组,主要平铺 + 次要折叠)              -->
    <!-- ============================================================ -->
    <section id="region-4" class="audit-card">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>📂</span><span>原始数据因子</span>
          <span class="text-[11px] font-normal text-slate-500 ml-2"
                x-text="'共 ' + (state.factor_cards || []).filter(c => c.tier !== 'composite').length + ' 个'"></span>
        </h2>
        <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5">
          系统从这些底层因子出发,逐层合成组合因子,再进入五层证据判断。每组内主要因子平铺展示,其他折叠。
        </p>
      </header>
      <div class="divide-y divide-slate-100 dark:divide-slate-800">
        <template x-for="group in factorGroups()" :key="group.key">
          <section class="p-4 space-y-2">
            <header class="flex items-center justify-between">
              <h3 class="text-[13px] font-semibold flex items-center gap-2">
                <span x-text="group.icon"></span>
                <span x-text="group.label"></span>
                <span class="text-[10px] font-normal text-slate-500"
                      x-text="'主要 ' + group.primary.length + ' / 次要 ' + group.secondary.length + ' · 左绿边=主要'"></span>
              </h3>
              <span class="text-[10px] text-slate-500" x-text="group.source"></span>
            </header>

            <!-- Sprint 2.3 R3:2 列 → 3 列,每卡更紧凑。
                 主要因子在前(左绿边),次要因子在后(无边)。
                 奇数补虚线占位,明确"本组到此为止"。-->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
              <template x-for="c in group.allOrdered" :key="c.card_id">
                <article class="border border-slate-200 dark:border-slate-800 rounded px-2.5 py-2
                                space-y-1 min-w-0"
                         :class="c.is_primary ? 'border-l-2 border-l-emerald-500 dark:border-l-emerald-400' : ''"
                         :id="'card-' + c.card_id">
                  <header class="flex items-center gap-1.5">
                    <h4 class="text-[11px] font-medium flex-1 truncate"
                        :title="c.name + ' (' + (c.name_en || '') + ')'"
                        x-text="c.name"></h4>
                    <span class="text-[13px] font-mono font-semibold tabular-nums shrink-0"
                          :class="directionClass(c.impact_direction)"
                          x-text="formatFactorValue(c.current_value)
                                  + (c.value_unit ? (' ' + c.value_unit) : '')"></span>
                    <span class="inline-block w-1.5 h-1.5 rounded-full shrink-0"
                          :class="freshnessColor(c.data_fresh ? 'green' : 'red')"
                          :title="fetchedAtPrimary(c) || '无时间戳'"></span>
                  </header>
                  <p class="text-[10.5px] text-slate-600 dark:text-slate-400 leading-snug truncate"
                     :title="c.plain_interpretation"
                     x-text="c.plain_interpretation"></p>
                  <!-- Sprint 2.6-H.1:单行显示 fetched_at_bjt(K 线 bar 时间对用户没用,
                       误导为"数据停留")。fetched 缺失时降级到 captured。 -->
                  <div class="flex items-center justify-between text-[10px] leading-tight">
                    <span :class="directionClass(c.impact_direction)"
                          x-text="'影响:' + directionLabel(c.impact_direction)
                                  + ' · ' + c.linked_layer"></span>
                    <span class="font-mono tabular-nums text-slate-500 truncate ml-2"
                          x-text="fetchedAtPrimary(c) || '—'"></span>
                  </div>
                </article>
              </template>
              <!-- 奇数补虚线占位:n 个因子在 3 列网格下右边空 (3 - n%3) % 3 格 -->
              <template x-if="group.allOrdered.length % 3 !== 0">
                <div class="hidden md:flex border border-dashed border-slate-200 dark:border-slate-800
                            rounded px-2.5 py-2 text-[10px] text-slate-400
                            items-center justify-center"
                     x-text="'本组共 ' + group.allOrdered.length + ' 个因子'"></div>
              </template>
              <template x-if="group.allOrdered.length % 3 === 1">
                <div class="hidden md:flex border border-dashed border-slate-200 dark:border-slate-800
                            rounded px-2.5 py-2 text-[10px] text-slate-400
                            items-center justify-center"
                     x-text="''"></div>
              </template>
            </div>
          </section>
        </template>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- 📅 区域 5:历史与复盘                                         -->
    <!-- Sprint 1.5n:无历史时整段隐藏(避免空状态占主屏)             -->
    <!-- ============================================================ -->
    <section id="region-5" class="audit-card"
             x-show="historyTimeline().length > 0">
      <header class="px-4 py-2.5 border-b border-slate-200 dark:border-slate-800">
        <h2 class="text-base font-semibold flex items-center gap-2">
          <span>📅</span><span>历史与复盘</span>
        </h2>
      </header>
      <!-- Sprint 2.3 R2:原 2/3 timeline + 1/3 复盘入口 → 时间线全宽 + 复盘入口作为一行薄条。
           避免"左长时间线 / 右两个短链接"的高度差留白。-->
      <div class="p-4 space-y-3">
        <!-- 复盘入口(一行全宽薄条)-->
        <div class="flex items-center justify-between flex-wrap gap-2 text-[11.5px]
                    border border-slate-200 dark:border-slate-800 rounded px-3 py-2">
          <span class="stat-label m-0">复盘入口</span>
          <div class="flex items-center gap-3">
            <a class="underline decoration-dotted text-slate-500 cursor-not-allowed">
              查看最新 weekly 复盘(v0.6)
            </a>
            <a class="underline decoration-dotted text-slate-500 cursor-not-allowed">
              已完成 lifecycle 复盘列表
            </a>
            <span class="text-[10px] text-slate-400">Sprint 2.4 接 /api/review/{lifecycle_id}</span>
          </div>
        </div>

        <!-- 最近运行时间线(全宽)-->
        <div>
          <h3 class="subheading mb-2">最近运行时间线</h3>
          <template x-if="historyTimeline().length > 0">
            <ol class="relative border-l-2 border-slate-200 dark:border-slate-800 pl-3 space-y-2">
              <template x-for="node in historyTimeline()" :key="node.ts_bjt">
                <li class="relative">
                  <span class="absolute -left-[15px] top-1.5 w-2 h-2 rounded-full"
                        :class="timelineNodeColor(node.type)"></span>
                  <div class="flex items-center gap-2 text-[10px] font-mono">
                    <span class="text-slate-500" x-text="node.ts_bjt"></span>
                    <span class="px-1 py-0 rounded text-[9px]"
                          :class="timelineNodeBadgeClass(node.type)"
                          x-text="timelineNodeTypeLabel(node.type)"></span>
                  </div>
                  <div class="text-[11.5px] mt-0.5" x-text="node.label"></div>
                </li>
              </template>
            </ol>
          </template>
          <div x-show="historyTimeline().length === 0"
               class="text-[11px] text-slate-500">
            暂无历史节点(Sprint 2.4 会接入完整 /api/strategy/history)。
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="pt-2 pb-4 text-[10px] text-slate-500 dark:text-slate-500 flex flex-wrap gap-3">
      <span>Data: CoinGlass / Glassnode / Yahoo Finance / FRED</span>
      <span>Rules <span x-text="state.meta && state.meta.rules_version"></span></span>
      <span>Model <span x-text="state.meta && state.meta.ai_model_actual"></span></span>
      <span>Source <span class="font-mono" x-text="dataSource"></span></span>
      <span class="ml-auto">策略审计层 • 非自动交易 • 决策由你</span>
    </footer>
  </main>
  </template>
</body>
</html>
